blackmamba.name=Black Mamba
blackmamba.desc=Black mambas are faster and more agile than normal snakes. Attacking them normally is not a good idea. At least the magical nature of the dungeon renders their poison ineffective.
undeadgnoll.name=Undead Gnoll
undeadgnoll.desc=Undead Gnolls not actually that scary with their vacant eyes. They are weaker than normal ones but they can absorb your life energy when they harm you.
hauntedcorpse.name=Haunted Corpse
hauntedcorpse.desc=This skeleton does not look like the other skeletons in the prison. Whatever possessed him had turned him into an unstable reservoir of dark magic. During the attack, he will use this power unbalancedly and cause great damage to everything around him.
ghostlyguard.name=Ghostly Guard
ghostlyguard.desc=This guard swore to protect the prison even if he died. His spiritual nature seems to grant him tremendous speed and evasion. However, he is not as durable as normal guards.
huntergnoll.name=Hunter Gnoll
huntergnoll.desc=Hunters are axe-throwing gnolls who live in caves and are hostile to anyone who enters their territory. The axes they throw with incredible force throw the opponent back and cause them to fall down the crevices. Even in close combat, hunters are strong enough to knock their enemies back.
olddwarf.name=Old Dwarf
olddwarf.desc=This dwarf looks more like rocks in a cave than a dwarf. It had wandered idly around the caves for a long time and was now no different from the rocks in the caves. Although its slow movements make its attacks very inaccurate, it has a hit that will crush the enemy if it hits. Plus, its rock-like skin makes it very durable. At least they can't come back to life like other city dwellers. 
multielemental.name=Multi Elemental
multielemental.desc=Multi Elementals are common elementals with high magic power. With each successful attack, they can use spells that can damage you or strengthen themselves.
pukhrajguard.name=Pukharj Guard
pukhrajguard.desc=When the dwarves became interested in dark magic and stopped using gemstones, the dwarf king found an alternative use for this resource hoard. These tough guardians will do their best to protect their king and city dwellers, and use their immense toughness to destroy outsiders like you.
tentacle.name=Tentacle
tentacle.desc=These tentacles emerging from underground are undoubtedly connected to a greater power. Approaching them makes you feel uneasy. Although moving is very troublesome for them, if they manage to attack, they will inflict great damage.
darkmimic.name=Dark Mimic
darkmimic.desc=This rare breed of mimics seems more interested in killing adventurers than trapping them. Dark mimics have no regard for stealth and once they see you, they will search for you throughout the entire floor and will not stop killing you when they find you.
fiddlercrab.name=Fiddler Crab
fiddlercrab.desc=Unlike other crabs in nature, this species has disproportionate claws, but they use both very well. Although they are not fast, fiddler crabs use their large claws as a weapon and a natural shield. It's better to be careful when fighting them.
firefly.name=Firefly
firefly.desc=While the entrance to the sewers was blocked, some insects remained locked below. The dark magic here also affected the fireflies and turned them into great powerful creatures. They are very durable, but they can't do much damage.
items.potions.potionofhealing.desc=This elixir will rapidly restore your health and instantly cure many ailments. But they won't last long in this dungeon.
dm101.name=DM101
dm101.desc=Unlike other DM models, DM101's prefer to attack as a group. Whit the extra device on their heads, they can call everyone on the floor for help when they attacked. The tasers looks like broken. They may be harmless from a distance but they will emit shock erratically.
tarantula.name=Tarantula
tarantula.desc=These nocturnal hunters have found a wonderfully dark environment for themselves. They are generally hunted for their meat. They are very efficient in this respect. Be careful, they have a very strong bite! It probably goes without saying that a spider is agile.
vampire.name=Vampire
vampire.desc=These vampires appear to imitate the bats in the cave to disguise themselves. They are as fast as bats and gain much more health when they hit. They look oddly familiar.
masterwarlock.name=Master Warlock
masterwarlock.desc=Master Warlocks, who are extremely experts in dark magic, have managed to make the chaotic teleportation spell more balanced. They use this spell to draw enemies away from them and make them open targets.
unknown.name=Unknown
unknown.desc=Not much is known about this type of demon. Although they are considered cousins ​​of succubuses, they prefer stealth rather than attacking directly. They are almost impossible to see while running but their magic is not strong.
whiteeye.name=White Eye
whiteeye.desc=White Eyes use an unstable light spell that blinds everything around it with powerful light beams. Losing visibility in the halls will challenge even the most skilled adventurers.
actors.buffs.ascensionchallenge.desc=Somehow Yog-Dzewa is maintaining influence on this world through the amulet, and is trying to stop your ascent!\n\nYog's power is making the dungeon much more dangerous, increasing the number of enemies and making them stronger! This power will keep building if left unchecked, it can be weakened by defeating enemies that have been enhanced by Yog's power. Moreover, since some enemies do not originate from this dungeon, Yog can't increase their power but defeating them will not reduce the power of the amulets curse.