blackmamba.name=Black Mamba
blackmamba.desc=Black mambas are faster and more agile than normal snakes.\n\nAttacking them normally is not a good idea. At least the magical nature of the dungeon renders their poison ineffective.
undeadgnoll.name=Undead Gnoll
undeadgnoll.desc=Undead Gnolls not actually that scary with their vacant eyes.\n\nThey are weaker than normal ones but they can _absorb your life energy_ when they harm you.
hauntedcorpse.name=Haunted Corpse
hauntedcorpse.desc=This skeleton does not look like the other skeletons in the prison. Whatever possessed him had turned him into an unstable reservoir of dark magic.\n\nDuring the attack, he will use this power unbalancedly and cause _great damage to everything around him._
ghostlyguard.name=Ghostly Guard
ghostlyguard.desc=This guard swore to protect the prison even if he died. His spiritual nature seems to grant him tremendous speed and evasion.\n\nHowever, he is not as durable as normal guards.
ghostlyguard.death_yell=No, not again!
huntergnoll.name=Hunter Gnoll
huntergnoll.desc=Hunters are axe-throwing gnolls who live in caves and are hostile to anyone who enters their territory. The axes they throw with incredible force throw the opponent back and _cause them to fall down_ the crevices.\n\nEven in close combat, hunters are strong enough to knock their enemies back.
olddwarf.name=Old Dwarf
olddwarf.desc=This dwarf looks more like rocks in a cave than a dwarf. It had wandered idly around the caves for a long time and was now no different from the rocks in the caves.\n\nAlthough its slow movements make its attacks very inaccurate, it has a hit that will _crush the enemy_ if it hits. Plus, its rock-like skin makes it very durable. At least they can't come back to life like other city dwellers. 
multielemental.name=Multi Elemental
multielemental.desc=Multi Elementals are common elementals with high magic power. With each successful attack, they can use spells that can damage you or strengthen themselves.\n\nMulti Elementals can't attack distant enemies.
pukhrajguard.name=Pukharj Guard
pukhrajguard.desc=When the dwarves became interested in dark magic and stopped using gemstones, the dwarf king found an alternative use for this resource hoard.\n\nThese tough guardians will do their best to protect their king and city dwellers, and use their immense toughness to destroy outsiders like you.
tentacle.name=Tentacle
tentacle.desc=These tentacles emerging from underground are undoubtedly connected to a greater power. Approaching them makes you feel uneasy.\n\nAlthough moving is very troublesome for them, if they manage to attack, they will _inflict great damage._
darkmimic.name=Dark Mimic
darkmimic.desc=This rare breed of mimics seems more interested in killing adventurers than trapping them. Dark mimics have no regard for stealth and once they see you, they will search for you throughout the entire floor and will not stop killing you when they find you.\n\nIt's almost _impossible to avoid their attacks._
fiddlercrab.name=Fiddler Crab
fiddlercrab.desc=Unlike other crabs in nature, this species has disproportionate claws, but they use both very well.\n\nAlthough they are not fast, fiddler crabs use their large claws as a weapon and a natural shield. It's better to be careful when fighting them.
firefly.name=Firefly
firefly.desc=While the entrance to the sewers was blocked, some insects remained locked below. The dark magic here also affected the fireflies and turned them into great powerful creatures.\n\nThey are very durable, but they can't do much damage.
items.potions.potionofhealing.desc=This elixir will rapidly restore your health and instantly cure many ailments.\n\nBut they won't last long in this dungeon.
dm101.name=DM-101
dm101.desc=Unlike other DM models, DM-101's prefer to attack as a group. Whit the extra device on their heads, they can _call everyone on the floor_ for help when they attacked.\n\nThe tasers looks like broken. They may be harmless from a distance but they will _emit shock_ erratically.
tarantula.name=Tarantula
tarantula.desc=These nocturnal hunters have found a wonderfully dark environment for themselves. They are generally hunted for their meat.\n\nThey are very efficient in this respect. Be careful, they have a very strong bite! It probably goes without saying that a spider is agile.
vampire.name=Vampire
vampire.desc=These vampires appear to imitate the bats in the cave to disguise themselves. They are as fast as bats and gain _much more health_ when they hit.\n\nThey look oddly familiar.
masterwarlock.name=Master Warlock
masterwarlock.desc=Master Warlocks, who are extremely experts in dark magic, have managed to make the chaotic teleportation spell more balanced.\n\nThey use this spell to draw enemies away from them and make them open targets.
unknown.name=Unknown
unknown.desc=Not much is known about this type of demon. Although they are considered cousins ​​of succubuses, they prefer stealth rather than attacking directly.\n\nThey are _almost impossible to see_ while running but their magic is not strong.
whiteeye.name=White Eye
whiteeye.desc=White Eyes use an unstable light spell that blinds everything around it with powerful light beams.\n\nLosing visibility in the halls will challenge even the most skilled adventurers.
actors.buffs.ascensionchallenge.desc=Somehow Yog-Dzewa is maintaining influence on this world through the amulet, and is trying to stop your ascent!\n\nYog's power is making the dungeon much more dangerous, increasing the number of enemies and making them stronger! This power will keep building if left unchecked, it can be weakened by defeating enemies that have been enhanced by Yog's power.\n\nMoreover, since some enemies do not originate from this dungeon, Yog can't increase their power but defeating them _will not reduce the power of the amulets curse!_
actors.mobs.goo.desc=Little is known about The Goo. It's quite possible that it is not even a creature, but rather a conglomerate of vile substances from the sewers that somehow gained basic intelligence. Regardless, dark magic is certainly what has allowed Goo to exist. You can see the dark aura around it.\n\nIts gelatinous nature has let it absorb lots of dark energy, you feel a chill just from being near. If Goo is able to attack with this energy you won't live for long.
actors.mobs.dm300.desc=The DM-300 is the largest and most powerful 'defense machine' that the dwarves ever built. Such an awesome machine is difficult to manufacture, so the dwarves only ever made a few to guard the entrances to their underground metropolis. But this DM-300 definitely doesn't look normal. You can see a _dark power_ flashing within it.\n\nIt is equipped with vents to jet its toxic exhaust fumes and a high power drill that it can use both to attack and disrupt the earth. DM-300 can also connect to an energy grid, further enhancing its power.
actors.mobs.dwarfking.desc=Many years ago one of the highest wizards in the dwarven court uncovered secrets which gave him tremendous power over life and death. He soon put this power to use, subjugating and corrupting his peers, his king, and eventually every dwarven citizen. Now he is king, ruler over a legion of undead subjects.\n\nHe seems to have used this immense power on himself as well. He is still vigorous among his clothes worn out over the years and the sword in his hand is definitely not an ordinary sword.\n\nThe King of Dwarves is an aggressive foe, who will attempt to surround and overwhelm his enemies with his horde of undead minions.
actors.mobs.yogdzewa$larva.desc=These tiny spawn of Yog-Dzewa are simple minions that are easy to produce. While individually weak, they are summoned quickly and can become overwhelming in large numbers.\n\nEven they were affected by the new and powerful darkness within Yog-Dzewa.
actors.mobs.yogdzewa.desc=Yog-Dzewa is an Old God; a great monstrosity which reaches into mortal worlds and devours them to fuel its endless growth. The dwarves must have attracted the attention of this cosmic horror while toying with dark magics, and have been trying to keep it contained ever since.\n\nYog-Dzewa originates from a dimension of raw magical chaos, and cannot bring its true form into this world. Instead it has created avatars and summoned demonic minions to do its bidding here. The dark silhouette of the eye also explains the strange creatures in the dungeon.\n\nThis giant dark eye is the focal point of Yog-Dzewa's power in this world. While the eye itself is immobile, it is capable of shooting powerful beams of demonic magic and summoning a variety of minions to aid it.
actors.mobs.skeleton.desc=Skeletons are composed of corpses bones from unlucky adventurers and inhabitants of the dungeon, animated by emanations of evil magic from the depths below. After they have been damaged enough, they disintegrate in an explosion of bones.\n\nThe additional dark power in the dungeon must have allowed only the oldest and most durable skeletons to survive.
actors.mobs.greatcrab.desc=This crab is gigantic, even compared to other sewer crabs. Its blue shell is covered in cracks, mosses and barnacles, showing great age. It lumbers around slowly, barely keeping balance with its massive claw.\n\nWhile the crab only has one claw, its size easily compensates. The crab holds the claw in front of any threat, shielding itself behind an impenetrable wall of carapace. However, the crab cannot block attacks it doesn't see coming, or attacks from multiple enemies at once.
actors.mobs.ghoul.desc=It looks like the King is using his last defense against you. Unlike ordinary ones, these ghouls are so old that they look like they could turn into dust at any moment.\n\nGhouls are not especially strong on their own, but always travel in groups and are much harder to kill in large numbers. _When a ghoul is defeated, it will rise again after a few turns as long as another ghoul is nearby._
actors.mobs.warlock.desc=These warlocks were once the most elite wizards of the dwarven court. However, the new king changed their entire being with a tremendous power that corrupted their minds. It's hard to even tell that they are dwarfs anymore.\n\nThese warlocks possess powerful disruptive magic, and are able to temporarily hinder the upgrade magic applied to your equipment. The more upgraded an item is, the more strongly it will be affected.
actors.mobs.monk.desc=The monks who were loyal to the old king suddenly changed their minds as they resisted the new king, but this required more dark power.\n\nMonks rely solely on the art of hand-to-hand combat, and are able to use their unarmed fists both for offense and defense. When they become focused, monks will parry the next physical attack used against them, even if it was otherwise guaranteed to hit. Monks build focus more quickly while on the move, and more slowly when in direct combat.
actors.mobs.golem.desc=Golems are an attempt to correct the previous flaws in dwarven machinery via the dwarves newfound use of magic. They are much more compact and efficient compared to the DM-300 while still being very deadly. Of course, when the new king took over, he started to use golems. Now their cores even glow the same color as the king's crown.\n\nWhile golems are still too large to fit into passageways, the dwarves have given them new magical abilities to compensate. Golems can teleport themselves between rooms, and teleport enemies to them when they are out of reach.
actors.mobs.npcs.ratking.name=Albino King