scenes.titlescene.update_body=You are using an outdated version of the game, some of the mods may not function properly. You can update the game via the _Update_ button in the menu.
scenes.titlescene.update_okay=Got it
scenes.titlescene$changesbutton.desc=Custom Pixel Dungeon is regularly updated with overhauls to existing game content, or entirely new content!\n\nGame balance is also frequently improved in game updates, so that specific items/heroes/enemies aren't too strong or too weak.\n\nUpdates also include fixes for bugs and other various stability improvements.
scenes.welcomescene.update_intro=Custom Pixel Dungeon has been updated!
scenes.welcomescene.update_msg=This updates introduces sprite frame configuration, that allows you to draw existing characters bigger or smaller than they are in the game.
scenes.welcomescene.patch_intro=Custom Pixel Dungeon has been patched!
scenes.welcomescene.what_msg=It seems that your current saves are from a future version of Custom Pixel Dungeon!\n\nTread with caution! Your saves may contain things which don't exist in this version, this could cause some very weird errors to occur.
scenes.welcomescene.save_warning=Custom Pixel Dungeon was interrupted while trying to save your game data recently. Custom PD has built-in protections against this, so your game data should be fine.\n\nThis usually happens when your device suddenly loses power, or if it terminates Custom PD without letting it close properly. Battery saver features can often cause this on mobile devices. Restarting your device may also help if you are seeing this error frequently.

