scenes.titlescene$changesbutton.desc=自定义地牢会时常更新以变更既有内容，或是加入新东西！\n\n游戏平衡也会经常得到调整，以维持物品、英雄、敌人强度的大致均衡。\n\n更新还包含漏洞修复与各种稳定性提升。
scenes.welcomescene.update_intro=自定义地牢已更新！
scenes.welcomescene.update_msg=本次更新引入了新的贴图配置，允许你绘制比游戏中更大或更小的贴图。
scenes.welcomescene.patch_intro=自定义地牢补丁已经成功安装！
scenes.welcomescene.what_msg=看起来你正使用的存档来自于新版本的自定义地牢！\n\n谨慎行事！你的存档可能包含一些这个版本中不存在的东西，这可能会导致一些非常奇怪的错误发生。
scenes.welcomescene.save_warning=最近，自定义地牢在进行存档时被打断了。\n\n本游戏内置有保护机制，所以你的游戏数据可能不会丢失。\n\n这通常发生在你的设备突然断电，或没有以合适方式关闭本游戏的时候。移动设备的省电功能通常会导致这种情况。\n\n如果你经常看见此提示，可以尝试通过重启设备的方法来解决。

