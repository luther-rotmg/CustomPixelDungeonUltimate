items.weapon.melee.magesstaff.imbue_desc=Are you sure you want to imbue your crystal with this wand?\n\nIf the wand being imbued is the same or higher level than the crystal, the crystal will inherit the level of that wand plus a single one of its own upgrades.\n\nThis imbue will result in a _level %d_ crystal.

