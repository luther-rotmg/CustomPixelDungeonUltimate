items.weapon.melee.magesstaff.imbue_talent=The wand currently imbued in your crystal has a _%1$d%% chance_ to be returned at +0. Wand returns remaining: _%2$d_. If your wand is not preserved, you will get 1 arcane resin instead.

items.weapon.melee.magesstaff.yes=Yes, I'm sure.

items.weapon.melee.magesstaff.no=No, I changed my mind

items.weapon.melee.magesstaff.desc=A shard of purest starlight, born from the final echo of Merlin's lineage. It hums with untamed potential, a fragment of a power meant to mend a shattered world. Two others slumber, awaiting the chosen hand to reunite them.

items.weapon.melee.magesstaff.no_wand=The crystal currently has no magic in it, it must be _imbued with a wand's power_ before it can be used to cast spells.

