actors.hero.abilities.warrior.heroicleap.name=Pounce

actors.hero.abilities.warrior.heroicleap.prompt=Choose direction to pounce

actors.hero.abilities.warrior.heroicleap.short_desc=The Chieftain performs a _Pounce_ towards a targeted location, sailing above enemies and hazards.

actors.hero.abilities.warrior.heroicleap.desc=The Chieftain leaps toward a targeted location, going over any enemies or hazards in the way. He cannot leap over walls or other solid terrain, however.

actors.hero.abilities.warrior.shockwave.name=booming roar

actors.hero.abilities.warrior.shockwave.short_desc=The Chieftain _Roars_, releasing a shockwave in a conical AOE. Enemies caught in this shockwave are damaged and crippled.

actors.hero.abilities.warrior.shockwave.desc=The Chieftain roars with a spiritual boost from his ancestors, producing a shockwave that travels up to 5 tiles in a 60 degree cone.\n\nEnemies caught in this shockwave are crippled for 5 turns. They also take 5-10 damage, plus an additional 1-2 damage for every point of strength the Chieftain has above 10.

actors.hero.abilities.warrior.endure.name=endure

actors.hero.abilities.warrior.endure$enduretracker.name=endurance

actors.hero.abilities.warrior.endure$enduretracker.desc=The Chieftain is now dealing bonus damage based on the damage he endured.\n\nBonus Damage: %1$d\nHits Left: %2$d

actors.hero.abilities.warrior.endure.short_desc=The Chieftain _Endures_, skipping several turns but gaining high damage resistance. He then deals bonus damage based on what he endured.

actors.hero.abilities.warrior.endure.desc=The Chieftain endures for 3 turns, taking half damage from all sources. This reduction is applied before damage resisting effects like armor.\n\nAfter enduring, the Chieftain's next hit within 10 turns gains bonus damage. This bonus damage is equal to half of all the damage inflicted on him while enduring, before any damage reduction effects!\n\nIf the Chieftain has any combo, using this ability increases its remaining time by 3 turns.

actors.hero.abilities.mage.elementalblast.name=elemental blast

actors.hero.abilities.mage.elementalblast.no_staff=You can't use this ability without your crystal.

actors.hero.abilities.mage.elementalblast.short_desc=The Sorceress emits an _Elemental Blast_ from her crystal, covering a large area around her in an effect that varies based on the wand in her crystal.

actors.hero.abilities.mage.elementalblast.desc=The Sorceress emits a blast of magic, which covers a circular region up to 4 tiles away and deals up to 15-25 damage. The specific effect of elemental blast will vary by the wand imbued in the Sorceress' crystal.

actors.hero.abilities.mage.elementalblast.generic_desc=The effect of elemental blast will be similar to the effect of the wand when zapped at an enemy or ally.

actors.hero.abilities.mage.wildmagic.name=barrage

actors.hero.abilities.mage.wildmagic.no_wands=You have no wands to zap with!

actors.hero.abilities.mage.wildmagic.short_desc=The Sorceress unleashes a _barrage_ of magic from her wands, randomly firing them multiple times at a chosen target over a single turn.

actors.hero.abilities.mage.wildmagic.desc=The Sorceress unleashes the power in her wands, randomly firing them up to 4 times in a single turn. The Sorceress' crystal is not included in this effect.\n\nEach wand also has its level boosted by 2, up to +3. This ability uses half a wand charge for each zap, and no one wand can be fired more than 2 times.

actors.hero.abilities.mage.warpbeacon.name=warp beacon

actors.hero.abilities.mage.warpbeacon.depths=You can't warp between depths!

actors.hero.abilities.mage.warpbeacon.locked_floor=You cannot leave a locked floor!

actors.hero.abilities.mage.warpbeacon.too_far=That location is too far!

actors.hero.abilities.mage.warpbeacon.invalid_beacon=You can't place a beacon there!

actors.hero.abilities.mage.warpbeacon.window_desc=Your beacon is currently placed on floor %s.

actors.hero.abilities.mage.warpbeacon.window_tele=teleport to beacon

actors.hero.abilities.mage.warpbeacon.window_clear=clear beacon

actors.hero.abilities.mage.warpbeacon.window_cancel=cancel

actors.hero.abilities.mage.warpbeacon.short_desc=The Sorceress places a _Warping Beacon_ at her current location, which she can instantly teleport back to.

actors.hero.abilities.mage.warpbeacon.desc=The Sorceress places a beacon, which can then be warped to at will. Placing the beacon takes 1 turn, but warping to it is instantaneous.\n\nThe Sorceress cannot warp between floors by default, or use the beacon to reach inaccessible places such as locked rooms. The Sorceress can teleport into enemies, which will push them aside.

actors.hero.abilities.rogue.smokebomb.name=smoke bomb

actors.hero.abilities.rogue.smokebomb.fov=You can only jump to an empty location in your field of view

actors.hero.abilities.rogue.smokebomb.prompt=Choose a location to jump to

actors.hero.abilities.rogue.smokebomb$ninjalog.name=wooden decoy

actors.hero.abilities.rogue.smokebomb$ninjalog.desc=Somehow, enemies are easily convinced that this wooden decoy is the real Rogue!

actors.hero.abilities.rogue.smokebomb.short_desc=The Ronin throws down a _Smoke Bomb_ while blinking away. He blinds enemies near his old location.

actors.hero.abilities.rogue.smokebomb.desc=The Ronin throws down a smoke bomb and blinks up to 6 tiles away. He can blink through hazards and enemies, but not through solid terrain like walls.\n\nEnemies that are adjacent to the Ronin's old position will be blinded for 5 turns.

actors.hero.abilities.rogue.deathmark.name=death mark

actors.hero.abilities.rogue.deathmark.ally_target=You can only mark enemies

actors.hero.abilities.rogue.deathmark.short_desc=The Ronin places a _Death Mark_ on a chosen enemy. Marked enemies take bonus damage, but cannot die until the mark ends.

actors.hero.abilities.rogue.deathmark.desc=The Ronin places a mark on a chosen enemy, causing them to take 25% extra damage. The mark is applied instantly and lasts for 5 turns.\n\nMarked enemies take bonus damage but are unable to die until the mark expires. If an enemy has 0 HP when the mark ends, they will immediately die.

actors.hero.abilities.rogue.deathmark$deathmarktracker.name=marked for death

actors.hero.abilities.rogue.deathmark$deathmarktracker.desc=This enemy has been marked, causing them to take 25%% bonus damage, but also rendering them unable to die until the mark ends.\n\nTurns remaining: %s.

actors.hero.abilities.rogue.shadowclone.name=eiz?

actors.hero.abilities.rogue.shadowclone.short_desc=The Ronin summons a _Shadow Clone_, which can be directed to aid him in combat.

actors.hero.abilities.rogue.shadowclone.desc=The Ronin summons a shadowy mimic of himself, which can be directed to aid him in combat. Directing the eiz? does not cost any charge.\n\nThe clone has 80 HP, no armor, and deals 10-20 damage. All of these traits can be improved with talents, such that the clone benefits from weapons and armor the hero has.

actors.hero.abilities.rogue.shadowclone$shadowally.name=eiz?

actors.hero.abilities.rogue.shadowclone$shadowally.direct_defend=Your eiz? moves to that position.

actors.hero.abilities.rogue.shadowclone$shadowally.direct_follow=Your eiz? moves to follow you.

actors.hero.abilities.rogue.shadowclone$shadowally.direct_attack=Your eiz? moves to attack!

actors.hero.abilities.rogue.shadowclone$shadowally.desc=A copy of the Ronin, made from shadowy darkness. It stands stock still, with empty eyes and tiny wisps of darkness rising from it like steam.\n\nThe eiz? is not a perfect copy of the Ronin, but is still a decent fighter, and can benefit from the Ronin's equipment with the right talents.

actors.hero.abilities.huntress.spectralblades.name=spectral blades

actors.hero.abilities.huntress.spectralblades.short_desc=The Ranger throws _Spectral Blades_ at a target, inflicting damage depending on her currently equipped melee weapon.

actors.hero.abilities.huntress.spectralblades.desc=The Ranger throws out a spectral blade at an enemy, which acts like a ranged strike from her melee weapon. All of the normal effects of a melee weapon will activate, including enchantments.

actors.hero.abilities.huntress.naturespower.name=Elven Spirit

actors.hero.abilities.huntress.naturespower.short_desc=The Ranger calls upon her bow's _Elven Spirit_, increasing her movement speed and her bow's rate of fire for a short time.

actors.hero.abilities.huntress.naturespower.desc=The Ranger temporarily empowers herself and her bow with the power of the wood elves! This lasts for 8 turns.\n\nDuring this time, the Ranger moves at 2x speed, and attacks 33% faster with her bow. The bonus bow effects do not trigger if the Sniper is using her special attacks.

actors.hero.abilities.huntress.naturespower$naturespowertracker.name=Elven Spirit

actors.hero.abilities.huntress.naturespower$naturespowertracker.desc=The Ranger is briefly empowered, increasing her movement speed and attack speed with her bow.\n\nTurns remaining: %s.

actors.hero.abilities.huntress.spirithawk.name=spirit hawk

actors.hero.abilities.huntress.spirithawk.no_space=There is no free space near you.

actors.hero.abilities.huntress.spirithawk.short_desc=The Ranger summons a _Spirit Hawk_ familiar, which can help her scout locations and distract enemies.

actors.hero.abilities.huntress.spirithawk.desc=The Ranger summons a spirit hawk familiar, which can be directed by using the ability again while it is summoned. The hawk lasts for 100 turns, directing the hawk does not cost any charge.\n\nThe hawk has minimal health and attacking power, but is fast, evasive, and accurate. It shares its entire field of vision with the Ranger at all times. It is immune to all area-bound effects, such as fire and poison gas. It will not attack unless specifically directed to.

actors.hero.abilities.huntress.spirithawk$hawkally.name=spirit hawk

actors.hero.abilities.huntress.spirithawk$hawkally.direct_defend=Your hawk moves to that position.

actors.hero.abilities.huntress.spirithawk$hawkally.direct_follow=Your hawk moves to follow you.

actors.hero.abilities.huntress.spirithawk$hawkally.direct_attack=Your hawk moves to attack!

actors.hero.abilities.huntress.spirithawk$hawkally.desc=A magical hawk, summoned by the Ranger. It glows a bright ethereal blue, its head constantly shifts around as it surveys the area.\n\nWhile it isn't much of a fighter, its speed and vision make it excellent for scouting and distracting enemies.\n\nTurns remaining: %d.

actors.hero.abilities.huntress.spirithawk$hawkally.desc_dodges=Guaranteed dodges remaining: %d.

actors.hero.abilities.duelist.challenge.name=showdown

actors.hero.abilities.duelist.challenge.prompt=Choose an enemy to challenge

actors.hero.abilities.duelist.challenge.already_dueling=You can only be in one showdown at a time.

actors.hero.abilities.duelist.challenge.ally_target=You can only challenge enemies.

actors.hero.abilities.duelist.challenge.unreachable_target=You must be able to reach your target.

actors.hero.abilities.duelist.challenge.distant_target=That enemy is too far away to challenge.

actors.hero.abilities.duelist.challenge.short_desc=The Monk challenges a nearby enemy to a _Showdown_, temporarily freezing all other enemies.

actors.hero.abilities.duelist.challenge.desc=The Monk challenges a nearby enemy to a showdown. That enemy is compelled to fight him while all other enemies are temporarily frozen in time.\n\nThe target must be reachable and within 5 tiles of the Monk. The showdown lasts until 10 turns pass, the enemy dies, or the Monk is more than 5 tiles away from the enemy.\n\nFrozen enemies are invulnerable. The Monk's allies are not frozen by this ability, but if a boss is targeted its minions will not be frozen either.

actors.hero.abilities.duelist.challenge$duelparticipant.name=showdown participant

actors.hero.abilities.duelist.challenge$duelparticipant.desc=This character is participating in a showdown. They, and any of their allies or minions, are allowed to act normally while others are frozen.\n\nThe showdown will last for a set amount of time, until one participant dies, or until the participants move more than 5 tiles away from eachother.\n\nTurns remaining: %d.

actors.hero.abilities.duelist.elementalstrike.name=qi blast

actors.hero.abilities.duelist.elementalstrike.short_desc=The Monk performs a _Qi Blast_, spreading an effect in a conical AOE based on his weapon enchantment.

actors.hero.abilities.duelist.elementalstrike.desc=The Monk strikes an enemy or location, performing a regular attack that's guaranteed to hit and spreading a magical effect that travels up to 3 tiles in a 65 degree cone. This magical effect varies based on the enchantment on the Monk's primary weapon.

actors.hero.abilities.duelist.elementalstrike.generic_desc=An Qi Blast with no enchantment will release a small burst of energy, dealing 6-12 damage to all enemies in range.

actors.hero.abilities.duelist.feint.name=shadow step

actors.hero.abilities.duelist.feint.prompt=Choose a location to dash to

actors.hero.abilities.duelist.feint.too_far=That location is not adjacent to you.

actors.hero.abilities.duelist.feint.bad_location=You can't move to that location.

actors.hero.abilities.duelist.feint.short_desc=The Monk _Shadow Steps_, leaving an afterimage while dashing to an adjacent tile. Enemies will attack his afterimage, leaving them open to a counterattack.

actors.hero.abilities.duelist.feint.desc=The Monk channels his qi to his current location while dashing to an adjacent tile, leaving behind a momentary afterimage of himself. Enemies that were attacking the Monk will attack his afterimage instead.\n\nEnemies that attack the afterimage become confused, which cancels their next action and leaves them open to a surprise attack.

actors.hero.heroclass.warrior=Chieftain

actors.hero.heroclass.warrior_desc_short=The Chieftain endures extra damage with shielding granted by his _claw sigil._ The claw can be moved between armors and _transfers a single upgrade._

actors.hero.heroclass.warrior_desc=The Chieftain starts with a _unique claw sigil_ that generates shielding over his health. The claw can be moved between armors, and can _transfer a single upgrade_ with it.\n\nThe Chieftain also starts with his _worn claws_, _three throwing stones_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Chieftain automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Healing\n_-_ Scrolls of Rage

items.armor.armor.ac_detach=DETACH

items.armor.armor.detach_seal=You detach the claw from your armor.

items.armor.armor.seal_attached=The Chieftain's claw sigil is attached to this armor, it is providing him up to _%d shielding_.

actors.hero.heroclass.warrior_unlock=The Chieftain is automatically unlocked.

actors.hero.heroclass.mage=sorceress

actors.hero.heroclass.mage_desc_short=The Sorceress is an arcane expert and carries a _magical crystal_ that materializes from her palm. The crystal can be _imbued with any wand_ the Sorceress finds.

actors.hero.heroclass.mage_desc=The Sorceress starts with a _unique crystal_, which recharges significantly faster than a wand and has 1 more charge. The crystal _can be imbued with any wand_ the Sorceress finds in the dungeon.\n\nThe Sorceress also starts with a _wand of magic missile_ imbued in her crysral, cloth armor, a waterskin, and a velvet pouch.\n\nThe Sorceress automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Liquid Flame\n_-_ Scrolls of Upgrade

actors.hero.heroclass.mage_unlock=To unlock the Sorceress, _use a scroll of upgrade to make an item stronger._

items.armor.magearmor.name=arcane robe

items.armor.magearmor.desc=While wearing this gorgeous robe, the Sorceress can perform a special ability.

actors.hero.heroclass.rogue=ronin

actors.hero.heroclass.rogue_desc_short=The Ronin can evade enemies and strike from invisibility using his _t?mei manto._ He also _detects secrets and traps_ from a greater distance.

actors.hero.heroclass.rogue_desc=The Ronin starts with a _unique t?mei manto_, which he can use to become invisible at will.\n\nThe Ronin can _detect secrets and traps_ from a greater distance.\n\nThe Ronin also starts with _a tant?_, _three throwing knives_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Ronin automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Invisibility\n_-_ Scrolls of Magic Mapping

actors.hero.heroclass.rogue_unlock=To unlock the Ronin _perform 10 surprise attacks in one game._

items.armor.roguearmor.name=shinobi shuzoku

items.armor.roguearmor.desc=While wearing this dark garb, the Ronin can perform a special ability.

actors.hero.heroclass.huntress=ranger

actors.hero.heroclass.huntress_desc_short=The Ranger is a master of thrown weapons and has a _magical bow_ with infinite arrows. She also travels through tall grass _without trampling it._

actors.hero.heroclass.huntress_desc=The Ranger starts with a _unique spirit bow_, which can fire an infinite number of conjured arrows.\n\nThe Ranger can travel through tall grass _without trampling it_.\n\nThe Ranger also starts with _studded gloves_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Ranger automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Mind Vision\n_-_ Scrolls of Lullaby

actors.hero.heroclass.huntress_unlock=To unlock the Ranger _hit enemies with thrown weapons 10 times in one game._

items.armor.huntressarmor.name=ranger's garb

items.armor.huntressarmor.no_enemies=No enemies in sight

items.armor.huntressarmor.desc=While wearing this cloak, the Ranger can perform a special ability.

actors.hero.heroclass.duelist=monk

actors.hero.heroclass.duelist_desc_short=The Monk is a martial arts master who can use his weapon to trigger a _special weapon ability._ This special ability is _different for every weapon._

actors.hero.heroclass.duelist_desc=The Monk starts with a _unique duan jian_ with a special ability that recharges over time.\n\nEvery weapon class in the game has a _different special ability_ that the Monk can use.\n\nThe Monk also starts with _two throwing spikes_, cloth armor, a waterskin, and a velvet pouch.\n\nThe Monk automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Strength\n_-_ Scrolls of Mirror Image

actors.hero.heroclass.duelist_unlock=To unlock the Monk _equip a tier 2 or higher weapon with no strength penalty._

items.armor.duelistarmor.name=consecrated gi

items.armor.duelistarmor.desc=While wearing this sacred gi, the Monk can perform a special ability.

actors.hero.herosubclass.berserker=berserker

actors.hero.herosubclass.berserker_short_desc=The _Berserker_ builds rage as he takes damage. Rage increases his damage and can be activated at 100% for bonus shielding.

actors.hero.herosubclass.berserker_desc=The Berserker gains rage as he takes physical damage, including damage that gets blocked by his armor! Rage steadily fades away over time, but fades more slowly if he is at low HP.\n\nThe Berserker deals up to +50% damage at 100% rage. At 100% rage he can also go berserk, gaining 2-6x his seal's maximum shielding depending on his missing health and keeping his rage at 100% as long as he has shielding left. However, the Berserker needs time to recover after he goes berserk.

actors.hero.herosubclass.gladiator=mauler

actors.hero.herosubclass.gladiator_short_desc=The _Mauler_ builds combo when he makes successful attacks. He can spend combo to use unique abilities.

actors.hero.herosubclass.gladiator_desc=The Mauler builds one point of combo every time he makes a successful attack with a melee or thrown weapon. If the Mauler does not make a successful attack within 5 turns, his combo is reset.\n\nAs combo builds it unlocks a variety of combo abilities. A new ability becomes available at 2, 4, 6, 8, and 10 combo. Some abilities help build more combo, while others let the Mauler spend his combo on powerful attacks.

actors.hero.herosubclass.battlemage=battlemage

actors.hero.herosubclass.battlemage_short_desc=The _Battlemage_ conjures bonus effects when fighting in melee with her crystal. These effects depend on the wand her crystal is imbued with.

actors.hero.herosubclass.battlemage_desc=The Battlemage gains a bonus effect whenever she strikes in melee with her crystal, as if her crystal had an additional enchantment. These effects depend on the wand her crystal is imbued with, each wand providing its own effect. In addition to the wand effects, the Battlemage's crystal will also gain 0.5 charges when she strikes with it.

actors.hero.herosubclass.warlock=soulreaver

actors.hero.herosubclass.warlock_short_desc=The _Soulreaver_ has a chance to soul mark enemies with her wands. She will heal whenever she deals physical damage to marked enemies.

actors.hero.herosubclass.warlock_desc=The Soulreaver has a chance to inflict a soul mark on characters when she uses wands on them. The chance to apply a soul mark and its duration increase with wand level.\n\nWhen an enemy is soul marked, the Soulreaver will heal 2 hp for every 5 damage she deals to them, but only with attacks from melee or thrown weapons, not from wands!

actors.hero.herosubclass.assassin=shinobi

actors.hero.herosubclass.assassin_short_desc=The _Shinobi_ can prepare a deadly strike while he is invisible. The longer he waits, the more powerful the attack will be.

actors.hero.herosubclass.assassin_desc=The Shinobi prepares his next strike when he becomes invisible. The longer he prepares for, the more powerful his next attack will be. Preparation builds for up to 9 turns.\n\nAfter preparing, the Shinobi deals bonus damage on his next attack, can blink to his target, and can even instantly kill enemies who are weak enough.

actors.hero.herosubclass.freerunner=paruk?ru

actors.hero.herosubclass.freerunner_short_desc=The _Paruk?ru_ builds momentum as he runs, which can be used to start freerunning. This grants him bonus speed and evasion for a short while.

actors.hero.herosubclass.freerunner_desc=As the Paruk?ru moves he builds stacks of momentum. He can gain up to 10 momentum after running for 10 turns, but rapidly loses it if he stops moving. The Paruk?ru can use up his momentum to start freerunning, for 2 turns per point of momentum.\n\nWhen freerunning the Paruk?ru moves at 2x speed, and gains bonus evasion in proportion to his level. Once freerunning ends there is a cooldown before momentum can be built again.

actors.hero.herosubclass.sniper=sniper

actors.hero.herosubclass.sniper_short_desc=The _Sniper_ can pierce armor with her ranged attacks. After striking with a thrown weapon she can follow up with a special attack from her bow.

actors.hero.herosubclass.sniper_desc=The Sniper is a master of ranged combat, whose ranged attacks pierce enemy armor. When she attacks an enemy with a thrown weapon, she places a sniper's mark on them, which lets her follow up with a special attack from her bow. This special attack varies based on how her bow is augmented.\n\nAn unaugmented bow will fire a snapshot which deals reduced damage but fires instantly. A speed bow will fire a volley of three arrows which deal reduced damage, can still activate enchantments, and take 1 turn to fire. A damage bow will fire a sniper shot which is guaranteed to hit, deals bonus damage based on distance, and takes 2 turns to fire.

actors.hero.herosubclass.warden=warden

actors.hero.herosubclass.warden_short_desc=The _Warden_ can see through tall grass and gains bonus effects when she plants seeds and tramples plants.

actors.hero.herosubclass.warden_desc=The Warden has a strong connection to nature which grants her a variety of bonus effects relating to grass and plants. She is able to see through tall and furrowed grass as if it were empty space.\n\nThe Warden causes grass to sprout up around any seed she throws or plants, and gains special effects when trampling plants. These special effects replace the regular plant effects, meaning that no plant is harmful for her to step on.

actors.hero.herosubclass.champion=shaolin

actors.hero.herosubclass.champion_short_desc=The _Shaolin Monk_ can wield two weapons. His regular attacks use his primary weapon, but he can swap weapons and use either weapon's ability.

actors.hero.herosubclass.champion_desc=The Shaolin Monk is a master of melee weapons who can equip a secondary weapon in addition to his primary one. His regular attacks use his primary weapon, but he can swap his primary weapon instantly.\n\nThe secondary weapon's ability can be used at any time and has its own ability charges. His secondary weapon charges have a 50% reduced charge cap and charge speed.

actors.hero.herosubclass.monk=taijiquan

actors.hero.herosubclass.monk_short_desc=The _Taijiquan Monk_ builds energy while fighting. This energy can be spent on a variety of unique abilities.

actors.hero.herosubclass.monk_desc=The Taijiquan Monk is a master of physical technique and Qi. As he defeats enemies, he gains energy which can be used on a variety of defensive and utlity-focused abilities. This energy does not fade over time, but has a cap based on the Monk's level.

actors.hero.talent$followupstriketracker.name=followup strike

actors.hero.talent$followupstriketracker.desc=The Ranger has recently attacked an enemy with a thrown weapon, her next melee attack against the same target will have boosted damage.\n\nTurns remaining: %s.

actors.hero.talent$patientstriketracker.name=patient strike

actors.hero.talent$patientstriketracker.desc=The Monk has just spent a turn waiting, her next melee attack will deal bonus damage.

actors.hero.talent$preciseassaulttracker.name=precise assault

actors.hero.talent$preciseassaulttracker.desc=The Monk's next regular melee attack will gain bonus accuracy.\n\nTurns remaining: %s.

actors.hero.talent$deadlyfollowuptracker.name=deadly followup

actors.hero.talent$deadlyfollowuptracker.desc=The Monk has recently attacked an enemy with a thrown weapon, his melee attacks against the same target will have boosted damage.\n\nTurns remaining: %s.

actors.hero.talent$combinedlethalitytriggertracker.name=combined lethality

actors.hero.talent$combinedlethalitytriggertracker.executed=executed

actors.hero.talent$combinedlethalitytriggertracker.desc=The Monk's next attack will execute enemies below a certain health threshold.\n\nTurns remaining: %s.

actors.hero.talent.hearty_meal.title=hearty meal

actors.hero.talent.hearty_meal.desc=_+1:_ Eating heals the Chieftain for _2 HP_ when he is below 50% health, and _3 HP_ when he is below 25% health.\n\n_+2:_ Eating heals the Chieftain for _3 HP_ when he is below 50% health, and _5 HP_ when he is below 25% health.

actors.hero.talent.veterans_intuition.title=veteran's intuition

actors.hero.talent.veterans_intuition.desc=_+1:_ The Chieftain identifies weapons _1.75x faster_ and armor _2.5x faster_.\n\n_+2:_ The Chieftain identifies weapons _2.5x faster_ and armor _when he equips it_.

actors.hero.talent.test_subject.title=test subject

actors.hero.talent.test_subject.desc=_+1:_ Whenever the Chieftain identifies an item, he heals for _2 HP_.\n\n_+2:_ Whenever the Chieftain identifies an item, he heals for _3 HP_.

actors.hero.talent.iron_will.title=iron will

actors.hero.talent.iron_will.desc=_+1:_ The max shield provided by the Chieftain's seal is _increased by 1_.\n\n_+2:_ The max shield provided by the Chieftain's seal is _increased by 2_.

actors.hero.talent.iron_will.meta_desc=_If this talent is gained by a different hero_ it will grant its shielding benefit without the claw seal.

actors.hero.talent.iron_stomach.title=iron stomach

actors.hero.talent.iron_stomach.desc=_+1:_ Eating food takes the Chieftain 1 turn and grants him _75% damage resistance_ while eating.\n\n_+2:_ Eating food takes the Chieftain 1 turn and grants him _100% damage resistance_ while eating.

actors.hero.talent.restored_willpower.title=restored willpower

actors.hero.talent.restored_willpower.desc=_+1:_ Drinking a potion of healing instantly recharges _67% of the shielding_ from the Chieftain's claw seal.\n\n_+2:_ Drinking a potion of healing instantly recharges _100% of the shielding_ from the Chieftain's claw seal.\n\nThis talent also triggers when drinking potions or elixirs based on potions of healing.

actors.hero.talent.restored_willpower.meta_desc=_If this talent is gained by a different hero_ it will instead grant shielding equal to 5% max hp at +1, or 7.5% max hp at +2.

actors.hero.talent.runic_transference.title=runic transference

actors.hero.talent.runic_transference.desc=_+1:_ The Chieftain's claw seal can transfer _regular glyphs_ in the same way it transfers an upgrade.\n\n_+2:_ The Chieftain's claw seal can transfer _regular, powerful, and curse glyphs_ in the same way it transfers an upgrade.

actors.hero.talent.runic_transference.meta_desc=_If this talent is gained by a different hero_ it will instead help glyphs on your armor resist being removed by scrolls of upgrade. Glyphs will begin to be lost when upgrading from level 6(up from 4) at +1, or level 7(up from 4) at +2. The level where glyphs are guaranteed to be lost is unchanged at +8.

actors.hero.talent.lethal_momentum.title=lethal momentum

actors.hero.talent.lethal_momentum.desc=_+1:_ When the Chieftain lands a killing blow on an enemy with a physical weapon, it has a _67% chance_ to take 0 turns.\n\n_+2:_ When the Chieftain lands a killing blow on an enemy  with a physical weapon, it has a _100% chance_ to take 0 turns.

actors.hero.talent.improvised_projectiles.title=improvised projectiles

actors.hero.talent.improvised_projectiles.desc=_+1:_ The Chieftain can blind an enemy for _2 turns_ by throwing any item that isn?t a thrown weapon at them. This has a 50 turn cooldown.\n\n_+2:_ The Chieftain can blind an enemy for _3 turns_ by throwing any item that isn?t a thrown weapon at them. This has a 50 turn cooldown.

actors.hero.talent.hold_fast.title=hold fast

actors.hero.talent.hold_fast.desc=_+1:_ When the Chieftain waits he gains _0-2 armor_ until he moves.\n\n_+2:_ When the Chieftain waits he gains _0-4 armor_ until he moves.\n\n_+3:_ When the Chieftain waits he gains _0-6 armor_ until he moves.

actors.hero.talent.strongman.title=strongman

actors.hero.talent.strongman.desc=_+1:_ The Chieftain's strength is _increased by 8%_, rounded down.\n\n_+2:_ The Chieftain's strength is _increased by 13%_, rounded down.\n\n_+3:_ The Chieftain's strength is _increased by 18%_, rounded down.

actors.hero.talent.endless_rage.title=endless rage

actors.hero.talent.endless_rage.desc=_+1:_ The Berserker can reach a max of _116% rage_.\n\n_+2:_ The Berserker can reach a max of _133% rage_.\n\n_+3:_ The Berserker can reach a max of _150% rage_.\n\nEach point of rage above 100% increases berserk shielding by 1% and reduces cooldown by 1%, but does not increase the damage bonus beyond +50%.

actors.hero.talent.deathless_fury.title=deathless fury

actors.hero.talent.deathless_fury.desc=_+1:_ Berserk automatically triggers if the Berserker is about to die and rage is at or above 100%, but it has a cooldown of _3 hero levels_ when this happens.\n\n_+2:_ Berserk automatically triggers if the Berserker is about to die and rage is at or above 100%, but it has a cooldown of _2 hero levels_ when this happens.\n\n_+3:_ Berserk automatically triggers if the Berserker is about to die and rage is at or above 100%, but it has a cooldown of _1 hero level_ when this happens.\n\nNote that the Berserker will still die if he has 0 HP when berserking ends.

actors.hero.talent.enraged_catalyst.title=enraged catalyst

actors.hero.talent.enraged_catalyst.desc=_+1:_ Enchantments and curses on the Berserker's weapon trigger more often the more rage he has, to a maximum of _15% more often_ at 100% rage.\n\n_+2:_ Enchantments and curses on the Berserker's weapon trigger more often the more rage he has, to a maximum of _30% more often_ at 100% rage.\n\n_+3:_ Enchantments and curses on the Berserker's weapon trigger more often the more rage he has, to a maximum of _45% more often_ at 100% rage.

actors.hero.talent.cleave.title=cleave

actors.hero.talent.cleave.desc=_+1:_ When the Mauler kills an enemy, the combo cooldown for his next hit is increased to _15 turns_.\n\n_+2:_ When the Mauler kills an enemy, the combo cooldown for his next hit is increased to _30 turns_.\n\n_+3:_ When the Mauler kills an enemy, the combo cooldown for his next hit is increased to _45 turns_.

actors.hero.talent.lethal_defense.title=lethal defense

actors.hero.talent.lethal_defense.desc=_+1:_ When the Mauler kills an enemy with a combo move, he _regains 33%_ of the claw seal's shielding.\n\n_+2:_ When the Mauler kills an enemy with a combo move, he _regains 67%_ of the claw seal's shielding.\n\n_+3:_ When the Mauler kills an enemy with a combo move, he _regains 100%_ of the claw seal's shielding.

actors.hero.talent.enhanced_combo.title=enhanced combo

actors.hero.talent.enhanced_combo.desc=_+1:_ When the Mauler's combo is 7 or higher, Clobber's knockback range increases to 3, it inflicts vertigo, and it can knock enemies into pits.\n\n_+2:_ In addition to the benefits of +1, when the Mauler's combo is 9 or higher Parry works on multiple attacks.\n\n_+3:_ In addition to the benefits of +1 and +2, the Mauler can leap up to combo/3 tiles when using Slam, Crush, or Fury.

actors.hero.talent.body_slam.title=body slam

actors.hero.talent.body_slam.desc=_+1:_ When the Chieftain lands after jumping, all adjacent enemies take damage equal to _1-4 plus 25%_ of his damage blocking power.\n\n_+2:_ When the Chieftain lands after jumping, all adjacent enemies take damage equal to _2-8 plus 50%_ of his damage blocking power.\n\n_+3:_ When the Chieftain lands after jumping, all adjacent enemies take damage equal to _3-12 plus 75%_ of his damage blocking power.\n\n_+4:_ When the Chieftain lands after jumping, all adjacent enemies take damage equal to _4-16 plus 100%_ of his damage blocking power.

actors.hero.talent.impact_wave.title=impact wave

actors.hero.talent.impact_wave.desc=_+1:_ When the Chieftain lands after jumping, all adjacent enemies are knocked _2 tiles_ back and have a _25% chance_ of becoming vulnerable for 5 turns.\n\n_+2:_ When the Chieftain lands after jumping, all adjacent enemies are knocked _3 tiles_ back and have a _50% chance_ of becoming vulnerable for 5 turns.\n\n_+3:_ When the Chieftain lands after jumping, all adjacent enemies are knocked _4 tiles_ back and have a _75% chance_ of becoming vulnerable for 5 turns.\n\n_+4:_ When the Chieftain lands after jumping, all adjacent enemies are knocked _5 tiles_ back and have a _100% chance_ of becoming vulnerable for 5 turns.

actors.hero.talent.double_jump.title=double jump

actors.hero.talent.double_jump.desc=_+1:_ If the Chieftain performs a second pounce within 3 turns, that leap has a _16% reduced_ charge cost.\n\n_+2:_ If the Chieftain performs a second pounce within 3 turns, that leap has a _30% reduced_ charge cost.\n\n_+3:_ If the Chieftain performs a second pounce within 3 turns, that leap has a _40% reduced_ charge cost.\n\n_+4:_ If the Chieftain performs a second pounce within 3 turns, that leap has a _50% reduced_ charge cost.

actors.hero.talent.expanding_wave.title=expanding wave

actors.hero.talent.expanding_wave.desc=_+1:_ Booming Roar's range is increased to _6 tiles_ from 5, and its width is increased to _75 degrees_ from 60.\n\n_+2:_ Booming Roar's range is increased to _7 tiles_ from 5, and its width is increased to _90 degrees_ from 60.\n\n_+3:_ Booming Roar's range is increased to _8 tiles_ from 5, and its width is increased to _105 degrees_ from 60.\n\n_+4:_ Booming Roar's range is increased to _9 tiles_ from 5, and its width is increased to _120 degrees_ from 60.

actors.hero.talent.striking_wave.title=striking wave

actors.hero.talent.striking_wave.desc=_+1:_ Booming Roar has a _30% chance_ to also use on-hit effects like enchantments and combo.\n\n_+2:_ Booming Roar has a _60% chance_ to also use on-hit effects like enchantments and combo.\n\n_+3:_ Booming Roar has a _90% chance_ to also use on-hit effects like enchantments and combo.\n\n_+4:_ Booming Roar has a _100% chance_ to also use on-hit effects like enchantments and combo, and it gives enchantments _+20% power_.

actors.hero.talent.shock_force.title=shock force

actors.hero.talent.shock_force.desc=_+1:_ Booming Roar deals _20% more damage_ and has a _25% chance_ to stun instead of cripple.\n\n_+2:_ Booming Roar deals _40% more damage_ and has a _50% chance_ to stun instead of cripple.\n\n_+3:_ Booming Roar deals _60% more damage_ and has a _75% chance_ to stun instead of cripple.\n\n_+4:_ Booming Roar deals _80% more damage_ and has a _100% chance_ to stun instead of cripple.

actors.hero.talent.sustained_retribution.title=sustained retribution

actors.hero.talent.sustained_retribution.desc=_+1:_ The Chieftain deals _115% bonus damage_ spread over _2 hits_, instead of 100% bonus damage in 1 hit.\n\n_+2:_ The Chieftain deals _130% bonus damage_ spread over _3 hits_, instead of 100% bonus damage in 1 hit.\n\n_+3:_ The Chieftain deals _145% bonus damage_ spread over _4 hits_, instead of 100% bonus damage in 1 hit.\n\n_+4:_ The Chieftain deals _160% bonus damage_ spread over _5 hits_, instead of 100% bonus damage in 1 hit.

actors.hero.talent.shrug_it_off.title=shrug it off

actors.hero.talent.shrug_it_off.desc=_+1:_ The Chieftain's damage reduction while enduring is _increased to 60%_, from 50%.\n\n_+2:_ The Chieftain's damage reduction while enduring is _increased to 68%_, from 50%.\n\n_+3:_ The Chieftain's damage reduction while enduring is _increased to 74%_, from 50%.\n\n_+4:_ The Chieftain's damage reduction while enduring is _increased to 80%_, from 50%.

actors.hero.talent.even_the_odds.title=even the odds

actors.hero.talent.even_the_odds.desc=_+1:_ The Chieftain deals an additional _5% bonus damage_ for every enemy within 2 tiles when enduring ends.\n\n_+2:_ The Chieftain deals an additional _10% bonus damage_ for every enemy within 2 tiles when enduring ends.\n\n_+3:_ The Chieftain deals an additional _15% bonus damage_ for every enemy within 2 tiles when enduring ends.\n\n_+4:_ The Chieftain deals an additional _20% bonus damage_ for every enemy within 2 tiles when enduring ends.

actors.hero.talent.empowering_meal.title=empowering meal

actors.hero.talent.empowering_meal.desc=_+1:_ Eating food grants the Sorceress _2 bonus damage_ on her next 3 wand zaps.\n\n_+2:_ Eating food grants the Sorceress _3 bonus damage_ on her next 3 wand zaps.

actors.hero.talent.scholars_intuition.title=scholar's intuition

actors.hero.talent.scholars_intuition.desc=_+1:_ The Sorceress identifies wands _3x faster_.\n\n_+2:_ The Sorceress identifies wands _when she uses them_.

actors.hero.talent.tested_hypothesis.title=tested hypothesis

actors.hero.talent.tested_hypothesis.desc=_+1:_ Whenever the Sorceress identifies an item, she gains _2 turns of wand recharging_.\n\n_+2:_ Whenever the Sorceress identifies an item, she gains _3 turns of wand recharging_.

actors.hero.talent.backup_barrier.title=backup barrier

actors.hero.talent.backup_barrier.desc=_+1:_ The Sorceress gains _3 shielding_ whenever she spends the last charge in her crystal.\n\n_+2:_ The Sorceress gains _5 shielding_ whenever she spends the last charge in her crystal.

actors.hero.talent.backup_barrier.meta_desc=_If this talent is gained by a different hero_ it will instead trigger from the hero's highest level wand.

actors.hero.talent.energizing_meal.title=energizing meal

actors.hero.talent.energizing_meal.desc=_+1:_ Eating food takes the Sorceress 1 turn and grants her _5 turns of wand recharging_.\n\n_+2:_ Eating food takes the Sorceress 1 turn and grants her _8 turns of wand recharging_.

actors.hero.talent.energizing_upgrade.title=energizing upgrade

actors.hero.talent.energizing_upgrade.desc=_+1:_ Using a scroll of upgrade instantly recharges the Sorceress' crystal _for 4 charges_, this can put it above its current charge cap.\n\n_+2:_ Using a scroll of upgrade instantly recharges the Sorceress' crystal _for 6 charges_, this can put it above its current charge cap.\n\nThis talent also triggers when using scrolls or spells based on scrolls of upgrade.

actors.hero.talent.energizing_upgrade.meta_desc=_If this talent is gained by a different hero_ it will instead grant 12 turns of wand recharging at +1, or 20 turns at +2.

actors.hero.talent.wand_preservation.title=wand preservation

actors.hero.talent.wand_preservation.desc=_+1:_ When the Sorceress imbues a new wand into her crystal, the old wand has a _67% chance_ of being returned at +0, otherwise it will be returned as 1 arcane resin.\n\n_+2:_ When the Sorceress imbues a new wand into her crystal, the old wand has a _100% chance_ of being returned at +0.\n\nThis talent can preserve wands a maximum of five times, afterward it will always grant 1 arcane resin.

actors.hero.talent.wand_preservation.meta_desc=_If this talent is gained by a different hero_ it will instead increase the amount of arcane resin gained when putting a wand into an alchemy pot by 1 at +1, or by 2 at +2.

actors.hero.talent.arcane_vision.title=arcane vision

actors.hero.talent.arcane_vision.desc=_+1:_ When the Sorceress zaps an enemy, she gains mind vision on them for _10 turns_.\n\n_+2:_ When the Sorceress zaps an enemy, she gains mind vision on them for _15 turns_.

actors.hero.talent.shield_battery.title=shield battery

actors.hero.talent.shield_battery.desc=_+1:_ The Sorceress can self-target with a wand to convert all of its charges into shielding at a rate of _4% max HP per charge_.\n\n_+2:_ The Sorceress can self-target with a wand to convert all of its charges into shielding at a rate of _6% max HP per charge_.

actors.hero.talent.empowering_scrolls.title=empowering scrolls

actors.hero.talent.empowering_scrolls.desc=_+1:_ When the Sorceress reads a scroll, her next _one wand zap_ will get +3 levels.\n\n_+2:_ When the Sorceress reads a scroll, her next _two wand zaps_ will get +3 levels.\n\n_+3:_ When the Sorceress reads a scroll, her next _three wand zaps_ will get +3 levels.

actors.hero.talent.ally_warp.title=ally warp

actors.hero.talent.ally_warp.desc=_+1:_ The Sorceress can tap an ally to instantly swap places with them, with a _2 tile range_.\n\n_+2:_ The Sorceress can tap an ally to instantly swap places with them, with a _4 tile range_.\n\n_+3:_ The Sorceress can tap an ally to instantly swap places with them, with a _6 tile range_.\n\nThe Sorceress cannot swap places with immobile allies.

actors.hero.talent.empowered_strike.title=empowered strike

actors.hero.talent.empowered_strike.desc=_+1:_ The Battlemage's first melee strike with her crystal after zapping with it deals _+16% damage_ and the crystal's bonus effect gets _+50% power_.\n\n_+2:_ The Battlemage's first melee strike with her crystal after zapping with it deals _+33% damage_ and the crystal's bonus effect gets _+100% power_.\n\n_+3:_ The Battlemage's first melee strike with her crystal after zapping with it deals _+50% damage_ and the crystal's bonus effect gets _+150% power_.

actors.hero.talent.mystical_charge.title=mystical charge

actors.hero.talent.mystical_charge.desc=_+1:_ Striking with her crystal grants the Battlemage _0.5 turns_ worth of artifact recharging.\n\n_+2:_ Striking with her crystal grants the Battlemage _1 turn_ worth of artifact recharging.\n\n_+3:_ Striking with her crystal grants the Battlemage _1.5 turns_ worth of artifact recharging.

actors.hero.talent.excess_charge.title=excess charge

actors.hero.talent.excess_charge.desc=_+1:_ When the Battlemage' crystal is fully charged, its next zap will grant her _0.67 shielding_ per level of the crystal.\n\n_+2:_ When the Battlemage' crystal is fully charged, its next zap will grant her _1.33 shielding_ per level of the crystal.\n\n_+3:_ When the Battlemage' crystal is fully charged, its next zap will grant her _2 shielding_ per level of the crystal.

actors.hero.talent.soul_siphon.title=soul siphon

actors.hero.talent.soul_siphon.desc=_+1:_ Melee damage dealt by other characters triggers the Soulreaver's soul mark at _13% effectiveness_.\n\n_+2:_ Melee damage dealt by other characters triggers the Soulreaver's soul mark at _27% effectiveness_.\n\n_+3:_ Melee damage dealt by other characters triggers the Soulreaver's soul mark at _40% effectiveness_.

actors.hero.talent.soul_eater.title=soul eater

actors.hero.talent.soul_eater.desc=_+1:_ Soul mark grants _0.33 turns_ of satiety for each physical damage dealt. Soul marked enemies have a _10% chance_ to trigger on-eat effects when they die.\n\n_+2:_ Soul mark grants _0.67 turns_ of satiety for each physical damage dealt. Soul marked enemies have a _20% chance_ to trigger on-eat effects when they die.\n\n_+3:_ Soul mark grants _1 turn_ of satiety for each physical damage dealt. Soul marked enemies have a _30% chance_ to trigger on-eat effects when they die.

actors.hero.talent.necromancers_minions.title=necromancer's minions

actors.hero.talent.necromancers_minions.desc=_+1:_ When a soul marked enemy dies, the Soulreaver has a _13% chance_ to raise them as a corrupted wraith.\n\n_+2:_ When a soul marked enemy dies, the Soulreaver has a _27% chance_ to raise them as a corrupted wraith.\n\n_+3:_ When a soul marked enemy dies, the Soulreaver has a _40% chance_ to raise them as a corrupted wraith.

actors.hero.talent.blast_radius.title=blast radius

actors.hero.talent.blast_radius.desc=_+1:_ Elemental blast's radius is increased to _5 tiles_, from 4.\n\n_+2:_ Elemental blast's radius is increased to _6 tiles_, from 4.\n\n_+3:_ Elemental blast's radius is increased to _7 tiles_, from 4.\n\n_+4:_ Elemental blast's radius is increased to _8 tiles_, from 4.

actors.hero.talent.elemental_power.title=elemental power

actors.hero.talent.elemental_power.desc=_+1:_ The power of elemental blast is increased by _25%_.\n\n_+2:_ The power of elemental blast is increased by _50%_.\n\n_+3:_ The power of elemental blast is increased by _75%_.\n\n_+4:_ The power of elemental blast is increased by _100%_.

actors.hero.talent.reactive_barrier.title=reactive barrier

actors.hero.talent.reactive_barrier.desc=_+1:_ The Sorceress gains _2.5 shielding_ for every character affected by elemental blast, to a max of 5 characters.\n\n_+2:_ The Sorceress gains _5 shielding_ for every character affected by elemental blast, to a max of 6 characters.\n\n_+3:_ The Sorceress gains _7.5 shielding_ for every character affected by elemental blast, to a max of 7 characters.\n\n_+4:_ The Sorceress gains _10 shielding_ for every character affected by elemental blast, to a max of 8 characters.

actors.hero.talent.wild_power.title=barrage boost

actors.hero.talent.wild_power.desc=_+1:_ When using barrage, wands will be boosted by either _2 or 3, up to +4_.\n\n_+2:_ When using barrage, wands will be boosted by _3, up to +5_.\n\n_+3:_ When using barrage, wands will be boosted by either _3 or 4, up to +6_.\n\n_+4:_ When using barrage, wands will be boosted by _4, up to +7_.

actors.hero.talent.fire_everything.title=fire everything

actors.hero.talent.fire_everything.desc=_+1:_ Barrage now fires _5 times_ up from 4, and each wand has a _25% chance_ to be usable 3 times.\n\n_+2:_ Barrage now fires _6 times_ up from 4, and each wand has a _50% chance_ to be usable 3 times.\n\n_+3:_ Barrage now fires _7 times_ up from 4, and each wand has a _75% chance_ to be usable 3 times.\n\n_+4:_ Barrage now fires _8 times_ up from 4, and each wand has a _100% chance_ to be usable 3 times.

actors.hero.talent.conserved_magic.title=conserved magic

actors.hero.talent.conserved_magic.desc=_+1:_ Each zap from barrage now uses _0.33 charges_ instead of 0.5, and barrage has a _25% chance_ to not spend a turn.\n\n_+2:_ Each zap from barrage now uses _0.225 charges_ instead of 0.5, and barrage has a _50% chance_ to not spend a turn.\n\n_+3:_ Each zap from barrage now uses _0.15 charges_ instead of 0.5, and barrage has a _75% chance_ to not spend a turn.\n\n_+4:_ Each zap from barrage now uses _0.1 charges_ instead of 0.5, and barrage has a _100% chance_ to not spend a turn.

actors.hero.talent.telefrag.title=Telefrag

actors.hero.talent.telefrag.desc=_+1:_ If the Sorceress warps into another character she deals _10-15 damage_ to it, but also takes _5 damage_.\n\n_+2:_ If the Sorceress warps into another character she deals _20-30 damage_ to it, but also takes _10 damage_.\n\n_+3:_ If the Sorceress warps into another character she deals _30-45 damage_ to it, but also takes _15 damage_.\n\n_+4:_ If the Sorceress warps into another character she deals _40-60 damage_ to it, but also takes _20 damage_.\n\nThe hero cannot be killed by this talent, the self damage can be reduced by magic resisting effects.
actors.hero.talent.remote_beacon.title=Remote Beacon

actors.hero.talent.remote_beacon.desc=_+1:_ The Sorceress can place a beacon at any location within _4 tiles_.\n\n_+2:_ The Sorceress can place a beacon at any location within _8 tiles_.\n\n_+3:_ The Sorceress can place a beacon at any location within _12 tiles_.\n\n_+4:_ The Sorceress can place a beacon at any location within _16 tiles_.\n\nThe Sorceress cannot place beacons in locations that are inaccessible.

actors.hero.talent.longrange_warp.title=Longrange Warp

actors.hero.talent.longrange_warp.desc=_+1:_ The Sorceress can now warp between floors, at _150% charge cost_.\n\n_+2:_ The Sorceress can now warp between floors, at _117% charge cost_.\n\n_+3:_ The Sorceress can now warp between floors, at _83% charge cost_.\n\n_+4:_ The Sorceress can now warp between floors, at _50% charge cost_.\n\nThe Sorceress cannot use longrange warp to leave a locked floor.

actors.hero.talent.cached_rations.title=cached rations

actors.hero.talent.cached_rations.desc=_+1:_ The Ronin can find _4 small rations_ placed in chests while he explores the earlier stages of the dungeon.\n\n_+2:_ The Ronin can find _6 small rations_ placed in chests while he explores the earlier stages of the dungeon.

actors.hero.talent.thiefs_intuition.title=thief's intuition

actors.hero.talent.thiefs_intuition.desc=_+1:_ The Ronin identifies rings _2x faster_, and identifies the type of a ring _when he equips it_.\n\n_+2:_ The Ronin identifies rings _when he equips them_, and identifies the type of a ring _when he picks it up_.

actors.hero.talent.sucker_punch.title=sucker punch

actors.hero.talent.sucker_punch.desc=_+1:_ The Ronin deals _1-2 bonus damage_ the first time he surprise attacks an enemy.\n\n_+2:_ The Ronin deals _2 bonus damage_ the first time he surprise attacks an enemy.

actors.hero.talent.protective_shadows.title=protective shadows

actors.hero.talent.protective_shadows.desc=_+1:_ The Ronin gains one shielding _every other turn_ he is invisible, _to a max of 3_.\n\n_+2:_ The Ronin gains one shielding _every turn_ he is invisible, _to a max of 5_.

actors.hero.talent.mystical_meal.title=mystical meal

actors.hero.talent.mystical_meal.desc=_+1:_ Eating food takes the Ronin 1 turn and grants him _3 turns of artifact recharging_.\n\n_+2:_ Eating food takes the Ronin 1 turn and grants him _5 turns of artifact recharging_.\n\nThis talent cannot be used to let the horn of plenty recharge itself.

actors.hero.talent.mystical_upgrade.title=mystical upgrade

actors.hero.talent.mystical_upgrade.desc=_+1:_ Using a scroll of upgrade instantly recharges the Ronin's cloak _for 2 charges_, this can put it above its current charge cap.\n\n_+2:_ Using a scroll of upgrade instantly recharges the Ronin's cloak _for 3 charges_, this can put it above its current charge cap.\n\nThis talent also triggers when using scrolls or spells based on scrolls of upgrade.

actors.hero.talent.mystical_upgrade.meta_desc=_If this talent is gained by a different hero_ it will instead grant 6 turns of artifact recharging at +1, or 10 turns at +2.

actors.hero.talent.wide_search.title=wide search

actors.hero.talent.wide_search.desc=_+1:_ The Ronin?s search radius is increased from a 5x5 square to a _7x7 circle_.\n\n_+2:_ The Ronin?s search radius is increased from a 5x5 square to a _7x7 square_.

actors.hero.talent.wide_search.meta_desc=_If this talent is gained by a different hero_ it will instead increase their search radius from a 3x3 square to a 5x5 circle at +1, or a 5x5 square at +2.

actors.hero.talent.silent_steps.title=silent steps

actors.hero.talent.silent_steps.desc=_+1:_ The Ronin will not wake sleeping enemies while he is _3 or more tiles away from them_.\n\n_+2:_ The Ronin will not wake sleeping enemies while he is _not adjacent to them_.

actors.hero.talent.rogues_foresight.title=ronin's foresight

actors.hero.talent.rogues_foresight.desc=_+1:_ When the Ronin is on a level with a secret room, he has a _50% chance to notice_ that the level contains a secret.\n\n_+2:_ When the Ronin is on a level with a secret room, he has a _75% chance to notice_ that the level contains a secret.

actors.hero.talent.light_cloak.title=light cloak

actors.hero.talent.light_cloak.desc=_+1:_ The Ronin can use his cloak of shadows when it is not equipped, but it recharges at _25% speed_.\n\n_+2:_ The Ronin can use his cloak of shadows when it is not equipped, but it recharges at _50% speed_.\n\n_+3:_ The Ronin can use his cloak of shadows when it is not equipped, but it recharges at _75% speed_.

actors.hero.talent.light_cloak.meta_desc=_If this talent is gained by a different hero_ it will instead increase the charging speed of all artifacts by 7/13/20% at +1/+2/+3.

actors.hero.talent.enhanced_rings.title=enhanced rings

actors.hero.talent.enhanced_rings.desc=_+1:_ When the Ronin uses an artifact, his rings gain +1 upgrade for _3 turns_.\n\n_+2:_ When the Ronin uses an artifact, his rings gain +1 upgrade for _6 turns_.\n\n_+3:_When the Ronin uses an artifact, his rings gain +1 upgrade for _9 turns_.

actors.hero.talent.enhanced_lethality.title=enhanced lethality

actors.hero.talent.enhanced_lethality.desc=_+1:_ The Shinobi can assassinate enemies left at below _4/13/27/67% health_ per level of preparation, up from 3/10/20/50%.\n\n_+2:_ The Shinobi can assassinate enemies left at below _5/17/33/83% health_ per level of preparation, up from 3/10/20/50%.\n\n_+3:_ The Shinobi can assassinate enemies left at below _6/20/40/100% health_ per level of preparation, up from 3/10/20/50%.

actors.hero.talent.assassins_reach.title=shinobi's reach

actors.hero.talent.assassins_reach.desc=_+1:_ The Shinobi's blink range per level of preparation is increased to _1/3/4/6 tiles_, from 1/2/3/4.\n\n_+2:_ The Shinobi's blink range per level of preparation is increased to _2/4/6/8 tiles_, from 1/2/3/4.\n\n_+3:_ The Shinobi's blink range per level of preparation is increased to _2/5/7/10 tiles_, from 1/2/3/4.

actors.hero.talent.bounty_hunter.title=bounty hunter

actors.hero.talent.bounty_hunter.desc=_+1:_ When the Shinobi kills an enemy with a prepared strike their item drop chance is increased by _2/4/8/16%_, per level of preparation.\n\n_+2:_ When the Shinobi kills an enemy with a prepared strike their item drop chance is increased by _4/8/16/32%_, per level of preparation.\n\n_+3:_ When the Shinobi kills an enemy with a prepared strike their item drop chance is increased by _6/12/24/48%_, per level of preparation.

actors.hero.talent.evasive_armor.title=evasive armor

actors.hero.talent.evasive_armor.desc=_+1:_ While freerunning, the Paruk?ru gains an additional _+1 evasion_ per excess point of strength on his armor.\n\n_+2:_ While freerunning, the Paruk?ru gains an additional _+2 evasion_ per excess point of strength on his armor.\n\n_+3:_ While freerunning, the Paruk?ru gains an additional _+3 evasion_ per excess point of strength on his armor.

actors.hero.talent.projectile_momentum.title=projectile momentum

actors.hero.talent.projectile_momentum.desc=_+1:_ While freerunning, the Paruk?ru gains _+20% accuracy and +15% damage_ with thrown weapons.\n\n_+2:_ While freerunning, the Paruk?ru gains _+40% accuracy and +30% damage_ with thrown weapons.\n\n_+3:_ While freerunning, the Paruk?ru gains _+60% accuracy and +45% damage_ with thrown weapons.

actors.hero.talent.speedy_stealth.title=speedy stealth

actors.hero.talent.speedy_stealth.desc=_+1:_ The Paruk?ru gains 2 stacks of momentum per turn while he is invisible.\n\n_+2:_ In addition to the benefits of +1, freerunning no longer counts down while the Paruk?ru is invisible.\n\n_+3:_ In addition to the benefits of +1 and +2, the Paruk?ru moves at 2x speed while invisible, regardless of whether he is freerunning or not.

actors.hero.talent.hasty_retreat.title=hasty retreat

actors.hero.talent.hasty_retreat.desc=_+1:_ After blinking the Ronin gains _1 turn_ of haste and invisibility.\n\n_+2:_ After blinking the Ronin gains _2 turns_ of haste and invisibility.\n\n_+3:_ After blinking the Ronin gains _3 turns_ of haste and invisibility.\n\n_+4:_ After blinking the Ronin gains _4 turns_ of haste and invisibility.

actors.hero.talent.body_replacement.title=body replacement

actors.hero.talent.body_replacement.desc=_+1:_ After blinking, the Ronin leaves a wooden decoy behind that has _20 health and 1-3 armor_.\n\n_+2:_ After blinking, the Ronin leaves a wooden decoy behind that has _40 health and 2-6 armor_.\n\n_+3:_ After blinking, the Ronin leaves a wooden decoy behind that has _60 health and 3-9 armor_.\n\n_+4:_ After blinking, the Ronin leaves a wooden decoy behind that has _80 health and 4-12 armor_.\n\nOnly one decoy can be active at a time.

actors.hero.talent.shadow_step.title=shadow step

actors.hero.talent.shadow_step.desc=_+1:_ If the ronin uses smoke bomb while invisible, it occurs instantly and has a _16% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.\n\n_+2:_ If the ronin uses smoke bomb while invisible, it occurs instantly and has a _30% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.\n\n_+3:_ If the ronin uses smoke bomb while invisible, it occurs instantly and has a _41% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.\n\n_+4:_ If the ronin uses smoke bomb while invisible, it occurs instantly and has a _50% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.

actors.hero.talent.fear_the_reaper.title=fear the reaper

actors.hero.talent.fear_the_reaper.desc=_+1:_ When a death marked enemy reaches 0 hp, they become _crippled_.\n\n_+2:_ When a death marked enemy reaches 0 hp, they become _feared and crippled_.\n\n_+3:_ When a death marked enemy reaches 0 hp, they become _feared and crippled_ and enemies within 3 tiles become _crippled_.\n\n_+4:_ When a death marked enemy reaches 0 hp, they become _feared and crippled_ and enemies within 3 tiles become _feared and crippled_.

actors.hero.talent.deathly_durability.title=deathly durability

actors.hero.talent.deathly_durability.desc=_+1:_ Enemies killed by death mark give the ronin shielding equal to _13%_ of their hp when they were marked.\n\n_+2:_ Enemies killed by death mark give the ronin shielding equal to _25%_ of their hp when they were marked.\n\n_+3:_ Enemies killed by death mark give the ronin shielding equal to _38%_ of their hp when they were marked.\n\n_+4:_ Enemies killed by death mark give the ronin shielding equal to _50%_ of their hp when they were marked.

actors.hero.talent.double_mark.title=double mark

actors.hero.talent.double_mark.desc=_+1:_ Marking a second target at the same time as the first one has a _30% reduced_ charge cost.\n\n_+2:_ Marking a second target at the same time as the first one has a _50% reduced_ charge cost.\n\n_+3:_ Marking a second target at the same time as the first one has a _65% reduced_ charge cost.\n\n_+4:_ Marking a second target at the same time as the first one has a _75% reduced_ charge cost.

actors.hero.talent.shadow_blade.title=shadow blade

actors.hero.talent.shadow_blade.desc=_+1:_ The eiz? gains _8%_ of the hero's damage per turn, and has a _25% chance_ to use the enchantment on the hero's weapon.\n\n_+2:_ The eiz? gains _16%_ of the hero's damage per turn, and has a _50% chance_ to use the enchantment on the hero's weapon.\n\n_+3:_ The eiz? gains _24%_ of the hero's damage per turn, and has a _75% chance_ to use the enchantment on the hero's weapon.\n\n_+4:_ The eiz? gains _32%_ of the hero's damage per turn, and has a _100% chance_ to use the enchantment on the hero's weapon.

actors.hero.talent.cloned_armor.title=cloned armor

actors.hero.talent.cloned_armor.desc=_+1:_ The eiz? gains _12%_ of the hero's armor value, and has a _25% chance_ to use the glyph on the hero's armor.\n\n_+2:_ The eiz? gains _24%_ of the hero's armor value, and has a _50% chance_ to use the glyph on the hero's armor.\n\n_+3:_ The eiz? gains _36%_ of the hero's armor value, and has a _75% chance_ to use the glyph on the hero's armor.\n\n_+4:_ The eiz? gains _48%_ of the hero's armor value, and has a _100% chance_ to use the glyph on the hero's armor.

actors.hero.talent.perfect_copy.title=perfect copy

actors.hero.talent.perfect_copy.desc=_+1:_ The eiz? gains _10%_ of the hero's max HP, and can instantly swap places with the hero up to _1 tile_ away.\n\n_+2:_ The eiz? gains _20%_ of the hero's max HP, and can instantly swap places with the hero up to _2 tiles_ away.\n\n_+3:_ The eiz? gains _30%_ of the hero's max HP, and can instantly swap places with the hero up to _3 tiles_ away.\n\n_+4:_ The eiz? gains _40%_ of the hero's max HP, and can instantly swap places with the hero up to _4 tiles_ away.

actors.hero.talent.natures_bounty.title=nature's bounty

actors.hero.talent.natures_bounty.desc=_+1:_ The Ranger can find _4 berries_ hidden in tall grass as she explores the earlier stages of the dungeon.\n\n_+2:_ The Ranger can find _6 berries_ hidden in tall grass as she explores the earlier stages of the dungeon.

actors.hero.talent.survivalists_intuition.title=survivalist's intuition

actors.hero.talent.survivalists_intuition.desc=_+1:_ The Ranger identifies all equipment _1.75x faster_.\n\n_+2:_ The Ranger identifies all equipment _2.5x faster_.

actors.hero.talent.followup_strike.title=followup strike

actors.hero.talent.followup_strike.desc=_+1:_ When the Ranger hits an enemy with her bow or a thrown weapon, her next melee attack against that enemy deals _2 bonus damage_.\n\n_+2:_ When the Ranger hits an enemy with her bow or a thrown weapon, her next melee attack against that enemy deals _3 bonus damage_.

actors.hero.talent.natures_aid.title=nature's aid

actors.hero.talent.natures_aid.desc=_+1:_ The Ranger gains 0-2 armor of barkskin, which fades every _3 turns_ when a plant's effect is activated in her vision.\n\n_+2:_ The Ranger gains 0-2 armor of barkskin, which fades every _5 turns_ when a plant's effect is activated in her vision.

actors.hero.talent.invigorating_meal.title=invigorating meal

actors.hero.talent.invigorating_meal.desc=_+1:_ Eating food takes the Ranger 1 turn (berries are eaten instantly) and grants her _1 turn of haste_.\n\n_+2:_ Eating food takes the Ranger 1 turn (berries are eaten instantly) and grants her _2 turns of haste_.

actors.hero.talent.restored_nature.title=restored nature

actors.hero.talent.restored_nature.desc=_+1:_ Drinking a potion of healing spawns _up to 5 grass_ around the Ranger, and roots adjacent enemies for _2 turns_.\n\n_+2:_ Drinking a potion of healing spawns _up to 8 grass_ around the Ranger, and roots adjacent enemies for _3 turns_.\n\nThis talent also triggers when drinking potions or elixirs based on potions of healing.

actors.hero.talent.rejuvenating_steps.title=rejuvenating steps

actors.hero.talent.rejuvenating_steps.desc=_+1:_ When the Ranger steps on short grass or embers, they spring up into tall grass which the Ranger immediately furrows. This has a _10 turn cooldown_.\n\n_+2:_ When the Ranger steps on short grass or embers, they spring up into tall grass which the Ranger immediately furrows. This has a _5 turn cooldown_.\n\nThis talent will produce furrowed grass if passive regeneration effects are disabled or the hero has not gained exp in a long time.

actors.hero.talent.heightened_senses.title=heightened senses

actors.hero.talent.heightened_senses.desc=_+1:_ The Ranger gains mind vision on any enemy within _2 tiles of her position_.\n\n_+2:_ The Ranger gains mind vision on any enemy within _3 tiles of her position_.

actors.hero.talent.durable_projectiles.title=durable projectiles

actors.hero.talent.durable_projectiles.desc=_+1:_ Thrown weapons have _+50% durability_ when used by the Ranger.\n\n_+2:_ Thrown weapons have _+75% durability_ when used by the Ranger.

actors.hero.talent.point_blank.title=point blank

actors.hero.talent.point_blank.desc=_+1:_ When the Ranger uses her bow or a thrown weapon at melee range it has _-30% accuracy,_ instead of -50%.\n\n_+2:_ When the Ranger uses her bow or a thrown weapon at melee range it has _-10% accuracy,_ instead of -50%.\n\n_+3:_ When the Ranger uses her bow or a thrown weapon at melee range it has _+10% accuracy,_ instead of -50%.\n\nNote that thrown weapons or the spirit bow always have +50% accuracy when used at a distance.

actors.hero.talent.seer_shot.title=seer shot

actors.hero.talent.seer_shot.desc=_+1:_ When the Ranger fires an arrow at the ground, it grants vision in a 3x3 area around it for _5 turns_. This has a 20 turn cooldown.\n\n_+2:_ When the Ranger fires an arrow at the ground, it grants vision in a 3x3 area around it for _10 turns_. This has a 20 turn cooldown.\n\n_+3:_ When the Ranger fires an arrow at the ground, it grants vision in a 3x3 area around it for _15 turns_. This has a 20 turn cooldown.

actors.hero.talent.seer_shot.meta_desc=_If this talent is gained by a different hero_ it will trigger from any thrown weapon.

actors.hero.talent.farsight.title=farsight

actors.hero.talent.farsight.desc=_+1:_ The Sniper's vision range is _increased by 25%_.\n\n_+2:_ The Sniper's vision range is _increased by 50%_.\n\n_+3:_ The Sniper's vision range is _increased by 75%_.

actors.hero.talent.shared_enchantment.title=shared enchantment

actors.hero.talent.shared_enchantment.desc=_+1:_ Thrown weapons have a _33% chance_ to use the enchantment on the Sniper's bow.\n\n_+2:_ Thrown weapons have a _67% chance_ to use the enchantment on the Sniper's bow.\n\n_+3:_ Thrown weapons have a _100% chance_ to use the enchantment on the Sniper's bow.\n\nThis talent does not apply to darts shot from an enchanted crossbow, they already trigger the crossbow's enchantment.

actors.hero.talent.shared_upgrades.title=shared upgrades

actors.hero.talent.shared_upgrades.desc=_+1:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the duration of sniper's mark by 1 turn and the damage of her special attack by _10%_.\n\n_+2:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the duration of sniper's mark by 1 turn and the damage of her special attack by _20%_.\n\n_+3:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the duration of sniper's mark by 1 turn and the damage of her special attack by _30%_.

actors.hero.talent.durable_tips.title=durable tips

actors.hero.talent.durable_tips.desc=_+1:_ Tipped darts have _2x durability_ when the Warden uses them.\n\n_+2:_ Tipped darts have _3x durability_ when the Warden uses them.\n\n_+3:_ Tipped darts have _4x durability_ when the Warden uses them.

actors.hero.talent.barkskin.title=barkskin

actors.hero.talent.barkskin.desc=_+1:_ When stepping in grass, the Warden gains _0-50% of her level_ in barkskin armor which fades every turn.\n\n_+2:_ When stepping in grass, the Warden gains _0-100% of her level_ in barkskin armor which fades every turn.\n\n_+3:_ When stepping in grass, the Warden gains _0-150% of her level_ in barkskin armor which fades every turn.

actors.hero.talent.shielding_dew.title=shielding dew

actors.hero.talent.shielding_dew.desc=_+1:_ Dewdrops can shield the Warden when her health is full, up to _20% of her max HP_.\n\n_+2:_ Dewdrops can shield the Warden when her health is full, up to _40% of her max HP_.\n\n_+3:_ Dewdrops can shield the Warden when her health is full, up to _60% of her max HP_.

actors.hero.talent.fan_of_blades.title=fan of blades

actors.hero.talent.fan_of_blades.desc=_+1:_ Spectral blades can hit up to _1 additional target_ for 50% damage. The target must be visible and within a _30 degree_ cone AOE.\n\n_+2:_ Spectral blades can hit up to _2 additional targets_ for 50% damage. The targets must be visible and within a _60 degree_ cone AOE.\n\n_+3:_ Spectral blades can hit up to _3 additional targets_ for 50% damage. The targets must be visible and within a _90 degree_ cone AOE.\n\n_+4:_ Spectral blades can hit up to _4 additional targets_ for 50% damage. The targets must be visible and within a _120 degree_ cone AOE.

actors.hero.talent.projecting_blades.title=projecting blades

actors.hero.talent.projecting_blades.desc=_+1:_ Spectral blades has _+25% accuracy_, and can penetrate up to _2 solid tiles_.\n\n_+2:_ Spectral blades has _+50% accuracy_, and can penetrate up to _4 solid tiles_.\n\n_+3:_ Spectral blades has _+75% accuracy_, and can penetrate up to _6 solid tiles_.\n\n_+4:_ Spectral blades has _+100% accuracy_, and can penetrate up to _8 solid tiles_.

actors.hero.talent.spirit_blades.title=spirit blades

actors.hero.talent.spirit_blades.desc=_+1:_ Spectral blades has a _30% chance_ to also use the enchantment on the spirit bow.\n\n_+2:_ Spectral blades has a _60% chance_ to also use the enchantment on the spirit bow.\n\n_+3:_ Spectral blades has a _90% chance_ to also use the enchantment on the spirit bow.\n\n_+4:_ Spectral blades has a _100% chance_ to also use the enchantment on the spirit bow, and it gives each enchantment _+10% power_.

actors.hero.talent.growing_power.title=growing power

actors.hero.talent.growing_power.desc=_+1:_ The attack and movespeed boosts from Elven Spirit are increased to _38% and 125%_, from 33% and 100%.\n\n_+2:_ The attack and movespeed boosts from Elven Spirit are increased to _42% and 150%_, from 33% and 100%.\n\n_+3:_ The attack and movespeed boosts from Elven Spirit are increased to _46% and 175%_, from 33% and 100%.\n\n_+4:_ The attack and movespeed boosts from Elven Spirit are increased to _50% and 200%_, from 33% and 100%.

actors.hero.talent.natures_wrath.title=nature's wrath

actors.hero.talent.natures_wrath.desc=_+1:_ While Elven Spirit is active, shots from the spirit bow have an _8% chance_ to trigger a random harmful plant effect.\n\n_+2:_ While Elven Spirit is active, shots from the spirit bow have a _17% chance_ to trigger a random harmful plant effect.\n\n_+3:_ While Elven Spirit is active, shots from the spirit bow have an _25% chance_ to trigger a random harmful plant effect.\n\n_+4:_ While Elven Spirit is active, shots from the spirit bow have a _33% chance_ to trigger a random harmful plant effect.\n\nThe plants that can be triggered are: blindweed, firebloom, icecap, sorrowmoss, and stormvine.

actors.hero.talent.wild_momentum.title=wild momentum

actors.hero.talent.wild_momentum.desc=_+1:_ Killing an enemy with the spirit bow prolongs the duration of Elven Spirit by _1 turn_. The duration can be extended by a max of _2 turns_.\n\n_+2:_ Killing an enemy with the spirit bow prolongs the duration of Elven Spirit by _2 turns_. The duration can be extended by a max of _4 turns_.\n\n_+3:_ Killing an enemy with the spirit bow prolongs the duration of Elven Spirit by _3 turns_. The duration can be extended by a max of _6 turns_.\n\n_+4:_ Killing an enemy with the spirit bow prolongs the duration of Elven Spirit by _4 turns_. The duration can be extended by a max of _8 turns_.

actors.hero.talent.eagle_eye.title=eagle eye

actors.hero.talent.eagle_eye.desc=_+1:_ The spirit hawk's vision range is increased to _7 tiles_ from 6.\n\n_+2:_ The spirit hawk's vision range is increased to _8 tiles_ from 6.\n\n_+3:_ The spirit hawk's vision range is increased to _9 tiles_ from 6, and it gets _2 tiles_ of mind vision.\n\n_+4:_ The spirit hawk's vision range is increased to _10 tiles_ from 6, and it gets _3 tiles_ of mind vision.

actors.hero.talent.go_for_the_eyes.title=go for the eyes

actors.hero.talent.go_for_the_eyes.desc=_+1:_ Attacks from the spirit hawk blind enemies for _2 turns_.\n\n_+2:_ Attacks from the spirit hawk blind enemies for _5 turns_.\n\n_+3:_ Attacks from the spirit hawk blind enemies for _5 turns_ and cripple them for _2 turns_.\n\n_+4:_ Attacks from the spirit hawk blind enemies for _5 turns_ and cripple them for _5 turns_.

actors.hero.talent.swift_spirit.title=swift spirit

actors.hero.talent.swift_spirit.desc=_+1:_ The spirit hawk's movement speed is increased to _2.5 tiles_ from 2, and it is guaranteed to dodge the first _2 attacks_ made against it.\n\n_+2:_ The spirit hawk's movement speed is increased to _3 tiles_ from 2, and it is guaranteed to dodge the first _4 attacks_ made against it.\n\n_+3:_ The spirit hawk's movement speed is increased to _3.5 tiles_ from 2, and it is guaranteed to dodge the first _6 attacks_ made against it.\n\n_+4:_The spirit hawk's movement speed is increased to _4 tiles_ from 2, and it is guaranteed to dodge the first _8 attacks_ made against it.

actors.hero.talent.strengthening_meal.title=strengthening meal

actors.hero.talent.strengthening_meal.desc=_+1:_ Eating food grants the Monk 3 bonus damage on her next _2 physical attacks_.\n\n_+2:_ Eating food grants the Monk 3 bonus damage on her next _3 physical attacks_.

actors.hero.talent.adventurers_intuition.title=adventurer's intuition

actors.hero.talent.adventurers_intuition.desc=_+1:_ The Monk identifies weapons _2.5x faster_ and armor _1.75x faster_.\n\n_+2:_ The Monk identifies weapons _when he equips them_ and armor _2.5x faster_.

actors.hero.talent.patient_strike.title=patient strike

actors.hero.talent.patient_strike.desc=_+1:_ If the Monk waits before performing a melee attack, he will deal _1-2 bonus damage_.\n\n_+2:_ If the Monk waits before performing a melee attack, he will deal _2 bonus damage_.

actors.hero.talent.aggressive_barrier.title=aggressive barrier

actors.hero.talent.aggressive_barrier.desc=_+1:_ The Monk gains 3 shielding when he uses a weapon ability and is below _40% health_.\n\n_+2:_ The Monk gains 3 shielding when he uses a weapon ability and is below _60% health_.

actors.hero.talent.aggressive_barrier.meta_desc=_If this talent is gained by a different hero_ it will instead grant shielding when making a melee attack at low health, with a 50 turn cooldown.

actors.hero.talent.focused_meal.title=focused meal

actors.hero.talent.focused_meal.desc=_+1:_ Eating food takes the Monk 1 turn and grants him _1 charge_ on his primary weapon.\n\n_+2:_ Eating food takes the Monk 1 turn and grants him _1.5 charge_ on his primary weapon.

actors.hero.talent.focused_meal.meta_desc=_If this talent is gained by a different hero_ it will instead grant bonus damage to their next attack equal to their level/3 at +1, or level/2 at +2.

actors.hero.talent.restored_agility.title=restored agility

actors.hero.talent.restored_agility.desc=_+1:_ The Monk has _4x evasion_ while drinking potions of healing.\n\n_+2:_ The Monk has _infinite evasion_ while drinking potions of healing.\n\nThis talent also triggers when drinking potions or elixirs based on potions of healing.

actors.hero.talent.weapon_recharging.title=weapon recharging

actors.hero.talent.weapon_recharging.desc=_+1:_ The Monk gains one primary weapon charge every _10 turns_ when under the effect of wand or artifact recharging buffs.\n\n_+2:_ The Monk gains one primary weapon charge every _6 turns_ when under the effect of wand or artifact recharging buffs.

actors.hero.talent.weapon_recharging.meta_desc=_If this talent is gained by a different hero_ it will instead cause them to deal +5% melee damage while recharging at +1, or +7.5% melee damage while recharging at +2.

actors.hero.talent.lethal_haste.title=lethal haste

actors.hero.talent.lethal_haste.desc=_+1:_ When the Monk lands a killing blow on an enemy with a weapon ability, he gains _2 turns_ of haste.\n\n_+2:_ When the Monk lands a killing blow on an enemy with a weapon ability, he gains _3 turns_ of haste.

actors.hero.talent.lethal_haste.meta_desc=_If this talent is gained by a different hero_ it will instead trigger with regular weapon attacks, with a 100 turn cooldown.

actors.hero.talent.swift_equip.title=lightning hands

actors.hero.talent.swift_equip.desc=_+1:_ The Monk can switch his equipped weapon instantly _one time_, with a 20 turn cooldown.\n\n_+2:_ The Monk can switch his equipped weapon instantly _twice within 5 turns_, with a 20 turn cooldown.\n\nIf the Monk has this talent and it is not on cooldown, quick-using an unequipped weapon will equip it.

actors.hero.talent.precise_assault.title=precise assault

actors.hero.talent.precise_assault.desc=_+1:_ When the Monk uses a weapon ability, he gains _2x accuracy_ on his next melee attack within 5 turns.\n\n_+2:_ When the Monk uses a weapon ability, he gains _4x accuracy_ on his next melee attack within 5 turns.\n\n_+3:_ When the Monk uses a weapon ability, he gains _8x accuracy_ on his next melee attack within 5 turns.

actors.hero.talent.precise_assault.meta_desc=_If this talent is gained by a different hero_ it will instead increase overall accuracy by 10% at +1, 20% at +2, or 30% at +3.

actors.hero.talent.deadly_followup.title=deadly followup

actors.hero.talent.deadly_followup.desc=_+1:_ When the Monk hits an enemy with a thrown weapon, he will deal _8% more melee damage_ to them for 5 turns.\n\n_+2:_ When the Monk hits an enemy with a thrown weapon, he will deal _16% more melee damage_ to them for 5 turns.\n\n_+3:_ When the Monk hits an enemy with a thrown weapon, he will deal _24% more melee damage_ to them for 5 turns.

actors.hero.talent.secondary_charge.title=secondary charge

actors.hero.talent.secondary_charge.desc=_+1:_ The Shaolin Monk's secondary weapon charge speed and charge cap are increased to _58%_ of her primary, from 50%.\n\n_+2:_ The Shaolin Monk's secondary weapon charge speed and charge cap are increased to _67%_ of her primary, from 50%.\n\n_+3:_ The Shaolin Monk's secondary weapon charge speed and charge cap are increased to _75%_ of her primary, from 50%.

actors.hero.talent.twin_upgrades.title=twin upgrades

actors.hero.talent.twin_upgrades.desc=_+1:_ If one of the Shaolin Monk's two equipped weapons has a lower level and is _2 or more tiers lower_ than the other weapon, it will be boosted to the other weapon's level.\n\n_+2:_ If one of the Shaolin Monk's two equipped weapons has a lower level and is _1 or more tiers lower_ than the other weapon, it will be boosted to the other weapon's level.\n\n_+3:_ If one of the Shaolin Monk's two equipped weapons has a lower level and is _the same tier or lower_ than the other weapon, it will be boosted to the other weapon's level.

actors.hero.talent.combined_lethality.title=combined lethality

actors.hero.talent.combined_lethality.desc=_+1:_ If the Shaolin Monk uses two different weapon abilities successively, the second ability will execute any non-boss enemy left at _below 13% HP_.\n\n_+2:_ If the Shaolin Monk uses two different weapon abilities successively, the second ability will execute any non-boss enemy left at _below 27% HP_.\n\n_+3:_ If the Shaolin Monk uses two different weapon abilities successively, the second ability will execute any non-boss enemy left at _below 40% HP_.\n\nIf the second ability does not contain an attack, this talent will instead trigger on the Shaolin Monk's next attack within 5 turns.

actors.hero.talent.unencumbered_spirit.title=unencumbered spirit

actors.hero.talent.unencumbered_spirit.desc=_+1:_ The Taijiquan Monk gains _40% more energy_ for each piece of _tier 3 or lower_ equipment he is using.\n\n_+2:_ The Taijiquan Monk gains _80% more energy_ for each piece of _tier 2 or lower_ equipment he is using.\n\n_+3:_ The Taijiquan Monk gains _120% more energy_ for each piece of _tier 1_ equipment he is using. He also gains a free cloth armor and studded gloves.\n\nNote that this talent gives no benefit from being unarmed or attacking with a Ring of Force.

actors.hero.talent.monastic_vigor.title=monastic vigor

actors.hero.talent.monastic_vigor.desc=_+1:_ If the Taijiquan Monk has _100% energy_, his abilities are empowered.\n\n_+2:_ If the Taijiquan Monk has _80% or more energy_, his abilities are empowered.\n\n_+3:_ If the Taijiquan Monk has _60% or more energy_, his abilities are empowered.\n\nWhen empowered:\n- Flurry applies your weapon's enchantment\n- Focus is instantaneous\n- Dash gains +3 range\n- Dragon Kick deals +50% damage and applies its knock back and stun effect to all adjacent enemies\n- Meditate slowly heals 20% of missing HP and grants 80% damage resistance.

actors.hero.talent.combined_energy.title=combined energy

actors.hero.talent.combined_energy.desc=_+1:_ If the Taijiquan Monk uses a weapon ability and a _4+ energy_ ability successively, he regains 50% of his spent energy and resets his ability cooldown.\n\n_+2:_ If the Taijiquan Monk uses a weapon ability and a _3+ energy_ ability successively, he regains 50% of his spent energy and resets his ability cooldown.\n\n_+3:_ If the Taijiquan Monk uses a weapon ability and a _2+ energy_ ability successively, he regains 50% of his spent energy and resets his ability cooldown.

actors.hero.talent.close_the_gap.title=close the gap

actors.hero.talent.close_the_gap.desc=_+1:_ The Monk blinks _up to two tiles_ toward his target when starting a duel.\n\n_+2:_ The Monk blinks _up to three tiles_ toward his target when starting a duel.\n\n_+3:_ The Monk blinks _up to four tiles_ toward his target when starting a duel.\n\n_+4:_ The Monk blinks _up to five tiles_ toward his target when starting a duel.\n\nThis blink can go through enemies and hazards, and is taken into account when determining if an enemy is in range to be challenged.

actors.hero.talent.invigorating_victory.title=invigorating victory

actors.hero.talent.invigorating_victory.desc=_+1:_ If the Monk defeats his target before the duel ends, he heals for _5 HP plus 30% of the damage_ he took during the duel.\n\n_+2:_ If the Monk defeats his target before the duel ends, he heals for _10 HP plus 50% of the damage_ he took during the duel.\n\n_+3:_ If the Monk defeats his target before the duel ends, he heals for _15 HP plus 65% of the damage_ he took during the duel.\n\n_+4:_ If the Monk defeats his target before the duel ends, he heals for _20 HP plus 75% of the damage_ he took during the duel.

actors.hero.talent.elimination_match.title=elimination match

actors.hero.talent.elimination_match.desc=_+1:_ If the Monk challenges again within 3 turns of a duel ending, that challenge has a _16% reduced_ charge cost.\n\n_+2:_ If the Monk challenges again within 3 turns of a duel ending, that challenge has a _30% reduced_ charge cost.\n\n_+3:_ If the Monk challenges again within 3 turns of a duel ending, that challenge has a _40% reduced_ charge cost.\n\n_+4:_ If the Monk challenges again within 3 turns of a duel ending, that challenge has a _50% reduced_ charge cost.

actors.hero.talent.elemental_reach.title=elemental reach

actors.hero.talent.elemental_reach.desc=_+1:_ Elemental strike's range is increased to _4 tiles_ from 3, and its width is increased to _75 degrees_ from 65.\n\n_+2:_ Elemental strike's range is increased to _5 tiles_ from 3, and its width is increased to _85 degrees_ from 65.\n\n_+3:_ Elemental strike's range is increased to _6 tiles_ from 3, and its width is increased to _95 degrees_ from 65.\n\n_+4:_ Elemental strike's range is increased to _7 tiles_ from 3, and its width is increased to _105 degrees_ from 65.

actors.hero.talent.striking_force.title=striking force

actors.hero.talent.striking_force.desc=_+1:_ The power of Qi Blast's effect is increased by _30%_.\n\n_+2:_ The power of Qi Blast's effect is increased by _60%_.\n\n_+3:_ The power of Qi Blast's effect is increased by _90%_.\n\n_+4:_ The power of Qi Blast's effect is increased by _120%_.

actors.hero.talent.directed_power.title=directed power

actors.hero.talent.directed_power.desc=_+1:_ The direct attack from Qi Blast gains _+30% enchantment power_ for each enemy in range of Qi Blast's effect, including the attack target.\n\n_+2:_ The direct attack from Qi Blast gains _+60% enchantment power_ for each enemy in range of Qi Blast's effect, including the attack target.\n\n_+3:_ The direct attack from Qi Blast gains _+90% enchantment power_ for each enemy in range of Qi Blast's effect, including the attack target.\n\n_+4:_ The direct attack from Qi Blast gains _+120% enchantment power_ for each enemy in range of Qi Blast's effect, including the attack target.

actors.hero.talent.feigned_retreat.title=feigned retreat

actors.hero.talent.feigned_retreat.desc=_+1:_ If an enemy attacks the Monk's afterimage, he gains _2 turns_ of haste.\n\n_+2:_ If an enemy attacks the Monk's afterimage, he gains _4 turns_ of haste.\n\n_+3:_ If an enemy attacks the Monk's afterimage, he gains _6 turns_ of haste.\n\n_+4:_ If an enemy attacks the Monk's afterimage, he gains _8 turns_ of haste.

actors.hero.talent.expose_weakness.title=expose weakness

actors.hero.talent.expose_weakness.desc=_+1:_ Enemies that attack the Monk's afterimage become vulnerable for _2 turns_.\n\n_+2:_ Enemies that attack the Monk's afterimage become vulnerable for _4 turns_.\n\n_+3:_ Enemies that attack the Monk's afterimage become vulnerable for _6 turns_.\n\n_+4:_ Enemies that attack the Monk's afterimage become vulnerable for _8 turns_.

actors.hero.talent.counter_ability.title=counter ability

actors.hero.talent.counter_ability.desc=_+1:_ If the Monk uses a weapon ability within 3 turns of his afterimage being attacked, it will consume _0.5 fewer charges_.\n\n_+2:_ If the Monk uses a weapon ability within 3 turns of his afterimage being attacked, it will consume _1 fewer charge_.\n\n_+3:_ If the Monk uses a weapon ability within 3 turns of his afterimage being attacked, it will consume _1.5 fewer charges_.\n\n_+4:_ If the Monk uses a weapon ability within 3 turns of his afterimage being attacked, it will consume _2 fewer charges_.

actors.mobs.npcs.wandmaker.intro_warrior=Oh, hello there! What a pleasant surprise to meet a Va Shir warrior from the north in such a depressing place! You must have travelled quite far to get here. If you're looking for adventure, I may have a task for you.

actors.mobs.npcs.wandmaker.intro_rogue=Konbanwa! I haven't met anyone from this place that still has his sanity, so you must be from the surface! If you're up to helping a stranger out, I may have a task for you.

actors.mobs.npcs.wandmaker.intro_mage=Oh, hello %s! I heard there was some ruckus regarding you and the wizards institute? Oh never mind, I never liked those stick-in-the-muds anyway. If you're willing, I may have a task for you.

actors.mobs.npcs.wandmaker.intro_huntress=Oh, hello miss! A friendly face is a pleasant surprise down here isn't it? In fact, I swear I've seen your face before, but I can't put my finger on it... Oh never mind, if you're here for adventure, I may have a task for you.

actors.mobs.npcs.wandmaker.intro_duelist=Oh, hello sir! What a pleasant surprise to meet a hero in such a depressing place! If you're up to helping an old man out, I may have a task for you.

items.weapon.melee.assassinsblade.name=assassin's blade

items.weapon.melee.assassinsblade.stats_desc=This weapon is stronger against unaware enemies.

items.weapon.melee.assassinsblade.ability_name=sneak

items.weapon.melee.assassinsblade.ability_desc=The Monk can _sneak_ while wielding an assassin's blade. This ability grants the Monk 6 turns of invisibility, but costs 2 charges.

items.weapon.melee.assassinsblade.desc=A small wavy blade made of obsidian, difficult to use despite being lightweight, but deadly if it finds the right mark.

items.weapon.melee.battleaxe.name=battle axe

items.weapon.melee.battleaxe.stats_desc=This is a rather accurate weapon.

items.weapon.melee.battleaxe.ability_name=heavy blow

items.weapon.melee.battleaxe.ability_desc=The Monk can perform a _heavy blow_ with a battle axe. This concentrated attack deals +35% damage and dazes for 5 turns, reducing accuracy and evasion by 50%. This ability costs 2 charges unless it surprises the enemy.

items.weapon.melee.battleaxe.desc=The enormous steel head of this battle axe puts considerable heft behind each wide stroke.

items.weapon.melee.crossbow.name=crossbow

items.weapon.melee.crossbow.stats_desc=This weapon enhances the damage of thrown darts when equipped, and will even grant its enchantment to them.

items.weapon.melee.crossbow.ability_name=charged shot

items.weapon.melee.crossbow.ability_desc=The Monk can ready a _charged shot_ with a crossbow. This ability activates instantly and causes the next fired dart to always hit, apply on-hit effects to enemies in a 5x5 tile area, and last longer if it is tipped.

items.weapon.melee.crossbow.desc=A fairly intricate weapon which shoots bolts at exceptional speeds. While it isn't designed for it, this crossbow's heft and sturdy construction make it a decent melee weapon as well.

items.weapon.melee.crossbow$chargedshot.name=charged shot

items.weapon.melee.crossbow$chargedshot.desc=The Monk is focusing power into his crossbow. The next dart he fires with it will always hit and apply tipped dart effects and the crossbow's enchantment in a 5x5 area. Positive dart effects will only affect allies, and harmful effects will only apply to enemies.\n\nTipped darts will also have four extra uses when fired using a charged shot. The Monk cannot use this ability to apply positive dart effects to himself.

items.weapon.melee.dagger.name=tant?

items.weapon.melee.dagger.stats_desc=This weapon is stronger against unaware enemies.

items.weapon.melee.dagger.ability_name=sneak

items.weapon.melee.dagger.ability_desc=The Monk can _sneak_ while wielding a tant?. This ability grants the Monk 10 turns of invisibility, but costs 2 charges.

items.weapon.melee.dagger.desc=A simple iron dagger with a worn wooden handle.

items.weapon.melee.dirk.name=dirk

items.weapon.melee.dirk.stats_desc=This weapon is stronger against unaware enemies.

items.weapon.melee.dirk.ability_name=sneak

items.weapon.melee.dirk.ability_desc=The Monk can _sneak_ while wielding a dirk. This ability grants the Monk 8 turns of invisibility, but costs 2 charges.

items.weapon.melee.dirk.desc=A longer thrusting dagger, gives a bit more steel to plunge into foes.

items.weapon.melee.flail.name=flail
items.weapon.melee.flail.stats_desc=This is a rather inaccurate weapon.\nThis weapon cannot surprise attack.

items.weapon.melee.flail.ability_name=spin

items.weapon.melee.flail.spin_warn=You can't spin the flail any more.

items.weapon.melee.flail.ability_desc=The Monk can _spin_ a flail to build up power for a short time. Each turn the flail is spun it will deal +33% damage, to a max of 3 times. A spinning flail is also guaranteed to hit. Starting to spin the flail costs 2 charges.

items.weapon.melee.flail.desc=A spiked ball attached to a handle by a length of chain. Very unwieldy, but devastating if it lands a solid hit.

items.weapon.melee.flail$spinabilitytracker.name=spinning

items.weapon.melee.flail$spinabilitytracker.desc=The Monk is spinning his flail, building damage for his next attack with it. Each spin takes one turn but increases damage by 33%%. The flail is also guaranteed to hit while spinning.\n\nCurrent bonus damage: %1$d%%.\nTurns remaining: %2$s.

items.weapon.melee.gauntlet.name=stone gauntlet

items.weapon.melee.gauntlet.stats_desc=This is a very fast weapon.

items.weapon.melee.gauntlet.ability_name=combo strike

items.weapon.melee.gauntlet.ability_desc=The Monk can perform a _combo strike_ with a stone gauntlet. This attack is guaranteed to hit and deals +35% damage for each time the Monk has already successfully attacked with melee or thrown weapons in the last 5 turns.

items.weapon.melee.gauntlet.desc=This massive gauntlet is made of crimson fabric with heavy magical stone layered on top. The fabric tightens around you, making the thick stone plates almost like a second skin. Swinging such a heavy weapon requires strength, but adds tremendous force to your blows.

items.weapon.melee.glaive.name=glaive

items.weapon.melee.glaive.stats_desc=This is a rather slow weapon.\nThis weapon has extra reach.

items.weapon.melee.glaive.ability_name=spike

items.weapon.melee.glaive.ability_desc=The Monk can use the tip of a glaive to _spike_ an enemy that is in range but not adjacent. This deals +30% damage, knocks the enemy back, and is guaranteed to hit.

items.weapon.melee.glaive.desc=A massive polearm consisting of a sword blade on the end of a pole.

items.weapon.melee.gloves.name=studded gloves

items.weapon.melee.gloves.stats_desc=This is a very fast weapon.

items.weapon.melee.gloves.ability_name=combo strike

items.weapon.melee.gloves.ability_desc=The Monk can perform a _combo strike_ with studded gloves. This attack is guaranteed to hit and deals +45% damage for each time the Monk has already successfully attacked with melee or thrown weapons in the last 5 turns.

items.weapon.melee.gloves.desc=These studded gloves don't provide any real protection, but they act as a serviceable weapon while keeping the hands free.

items.weapon.melee.greataxe.name=greataxe

items.weapon.melee.greataxe.stats_desc=This weapon is incredibly heavy.

items.weapon.melee.greataxe.ability_name=retribution

items.weapon.melee.greataxe.ability_desc=The Monk can perform a _retribution_ attack with a greataxe if he is below 50% health. This devastating attack is guaranteed to hit and deals +50% damage.

items.weapon.melee.greataxe.desc=Meant to be wielded over the shoulder, this titanic axe is as powerful as it is heavy.

items.weapon.melee.greatshield.name=greatshield

items.weapon.melee.greatshield.typical_stats_desc=Typically this weapon blocks 0-%d damage. This blocking scales with upgrades.

items.weapon.melee.greatshield.stats_desc=This weapon blocks 0-%d damage. This blocking scales with upgrades.

items.weapon.melee.greatshield.ability_name=guard

items.weapon.melee.greatshield.ability_desc=The Monk can _guard_ himself with a greatshield, completely negating the next physical or magical attack made against him within 6 turns.

items.weapon.melee.greatshield.desc=More like a mobile wall than a shield, this gigantic mass of metal aids defense, but doesn't leave much room for attacking.

items.weapon.melee.greatsword.name=greatsword

items.weapon.melee.greatsword.ability_name=cleave

items.weapon.melee.greatsword.ability_desc=The Monk can _cleave_ an enemy with a greatsword. This deals +20% damage and is guaranteed to hit. If cleave kills an enemy the Monk can use cleave again within 5 turns for free.

items.weapon.melee.greatsword.desc=This towering blade inflicts heavy damage by investing its heft into every swing.

items.weapon.melee.handaxe.name=hand axe

items.weapon.melee.handaxe.stats_desc=This is a rather accurate weapon.

items.weapon.melee.handaxe.ability_name=heavy blow

items.weapon.melee.handaxe.ability_desc=The Monk can perform a _heavy blow_ with a hand axe. This concentrated attack deals +45% damage and dazes for 5 turns, reducing accuracy and evasion by 50%. This ability costs 2 charges unless it surprises the enemy.

items.weapon.melee.handaxe.desc=A light axe, most commonly used for felling trees. The wide blade works well against foes as well.

items.weapon.melee.katana.name=katana

items.weapon.melee.katana.stats_desc=This weapon blocks 0-4 damage.

items.weapon.melee.katana.ability_name=lunge

items.weapon.melee.katana.ability_desc=The Monk can _lunge_ with a katana at an enemy 1 tile away. This moves toward the enemy, deals +35% damage, and is guaranteed to hit.

items.weapon.melee.katana.desc=A slender sword with a large metal guard above the handle.

items.weapon.melee.longsword.name=longsword

items.weapon.melee.longsword.ability_name=cleave

items.weapon.melee.longsword.ability_desc=The Monk can _cleave_ an enemy with a longsword. This deals +23% damage and is guaranteed to hit. If cleave kills an enemy the Monk can use cleave again within 5 turns for free.

items.weapon.melee.longsword.desc=This sword's long razor-sharp steel blade shines reassuringly, though its size does make it quite heavy.

items.weapon.melee.mace.name=mace

items.weapon.melee.mace.stats_desc=This is a rather accurate weapon.

items.weapon.melee.mace.ability_name=heavy blow

items.weapon.melee.mace.ability_desc=The Monk can perform a _heavy blow_ with a mace. This concentrated attack deals +40% damage and dazes for 5 turns, reducing accuracy and evasion by 50%. This ability costs 2 charges unless it surprises the enemy.

items.weapon.melee.mace.desc=The large iron head of this weapon inflicts substantial damage.

