items.weapon.melee.roundshield$guardtracker.guarded=guarded

items.weapon.melee.roundshield$guardtracker.desc=The Monk has readied his shield in anticipation of an incoming attack. The next physical or magical attack made against him will be completely negated.\n\nTurns remaining: %s.

items.weapon.melee.runicblade.name=runic blade

items.weapon.melee.runicblade.stats_desc=This weapon benefits more from upgrades.
items.weapon.melee.runicblade.ability_name=runic slash

items.weapon.melee.runicblade.ability_desc=The Monk can perform a _runic slash_ with a runic blade. This attack is guaranteed to hit and has +300% enchantment power.

items.weapon.melee.runicblade.desc=A mysterious weapon from a distant land, with a bright blue blade.

items.weapon.melee.sai.name=sai

items.weapon.melee.sai.stats_desc=This is a very fast weapon.

items.weapon.melee.sai.ability_name=combo strike

items.weapon.melee.sai.ability_desc=The Monk can perform a _combo strike_ with sai. This attack is guaranteed to hit and deals +40% damage for each time the Monk has already successfully attacked with melee or thrown weapons in the last 5 turns.

items.weapon.melee.sai.desc=Two thin blades meant to be wielded in one hand each. Excellent for tearing down enemies with a flurry of cuts.

items.weapon.melee.sai$combostriketracker.name=combo strike

items.weapon.melee.sai$combostriketracker.desc=The Monk is building combo that can be used to increase the damage of the combo strike ability. Each strike made with a melee or thrown weapon in the last 5 turns will count.\n\nRecent hits: %d.

items.weapon.melee.scimitar.name=scimitar

items.weapon.melee.scimitar.stats_desc=This is a rather fast weapon.

items.weapon.melee.scimitar.ability_name=sword dance

items.weapon.melee.scimitar.ability_desc=The Monk can perform a _sword dance_ with a scimitar. This stance grants the Monk +60% attack speed and +25% accuracy for 5 turns, takes no time to activate, and costs 2 charges.

items.weapon.melee.scimitar.desc=A thick curved blade. Its shape allows for faster, yet less powerful attacks.

items.weapon.melee.scimitar$sworddance.name=sword dance

items.weapon.melee.scimitar$sworddance.desc=The Monk is making quick momentum based strikes in a sort of dance. While this stance is active, he attacks 60%% faster (enough to attack exactly twice a turn with a scimitar) and has +25%% accuracy.\n\nTurns remaining: %s.

items.weapon.melee.sickle.name=sickle

items.weapon.melee.sickle.stats_desc=This is a rather inaccurate weapon.

items.weapon.melee.sickle.ability_name=harvest

items.weapon.melee.sickle.ability_desc=The Monk can _harvest_ an enemy with a sickle. This devastating attack inflicts bleed equal to 100% of damage and is guaranteed to hit, but costs 2 charges.

items.weapon.melee.sickle.desc=A handheld farming tool that can double as a strong but unwieldy weapon.

items.weapon.melee.spear.name=spear

items.weapon.melee.spear.stats_desc=This is a rather slow weapon.\nThis weapon has extra reach.

items.weapon.melee.spear.ability_name=spike

items.weapon.melee.spear.ability_desc=The Monk can use the tip of a spear to _spike_ an enemy that is in range but not adjacent. This deals +45% damage, knocks the enemy back, and is guaranteed to hit.

items.weapon.melee.spear.desc=A slender wooden rod tipped with sharpened iron.

items.weapon.melee.sword.name=sword

items.weapon.melee.sword.ability_name=cleave

items.weapon.melee.sword.ability_desc=The Monk can _cleave_ an enemy with a sword. This deals +27% damage and is guaranteed to hit. If cleave kills an enemy the Monk can use cleave again within 5 turns for free.

items.weapon.melee.sword.desc=A nicely balanced sword. Not too large, but still notably longer than a shortsword.

items.weapon.melee.sword$cleavetracker.name=cleave

items.weapon.melee.sword$cleavetracker.desc=The Monk is ready to follow up on his previous cleave. The next use of cleave will not cost any weapon ability charge.\n\nTurns remaining: %s.

items.weapon.melee.warhammer.name=war hammer

items.weapon.melee.warhammer.stats_desc=This is a rather accurate weapon.

items.weapon.melee.warhammer.ability_name=heavy blow

items.weapon.melee.warhammer.ability_desc=The Monk can perform a _heavy blow_ with a war hammer. This concentrated attack deals +30% damage and dazes for 5 turns, reducing accuracy and evasion by 50%. This ability costs 2 charges unless it surprises the enemy.

items.weapon.melee.warhammer.desc=Few creatures can withstand the crushing blow of this towering mass of lead and steel, but it takes great strength to use effectively.

items.weapon.melee.warscythe.name=war scythe

items.weapon.melee.warscythe.stats_desc=This is a rather inaccurate weapon.

items.weapon.melee.warscythe.ability_name=harvest

items.weapon.melee.warscythe.ability_desc=The Monk can _harvest_ an enemy with a war scythe. This devastating attack inflicts bleed equal to 80% of damage and is guaranteed to hit, but costs 2 charges.

items.weapon.melee.warscythe.desc=This large and unwieldy tool has been reinforced to make it better at cutting foes than crops.

items.weapon.melee.whip.name=whip

items.weapon.melee.whip.stats_desc=This weapon has tremendous reach.

items.weapon.melee.whip.ability_name=lash

items.weapon.melee.whip.ability_desc=The Monk can _lash_ all enemies around him with a whip. This ability performs a normal attack against all enemies within attack range and is guaranteed to hit the closest target.

items.weapon.melee.whip.desc=While the barbed length of rope at the end of this weapon deals poor damage, its reach cannot be matched.

items.weapon.melee.wornshortsword.name=worn claws

items.weapon.melee.wornshortsword.ability_name=cleave

items.weapon.melee.wornshortsword.ability_desc=The Monk can _cleave_ an enemy with a worn claws. This deals +33% damage and is guaranteed to hit. If cleave kills an enemy the Monk can use cleave again within 5 turns for free.

items.weapon.melee.wornshortsword.desc=Marking the start of a Va Shir warrior's journey, these claws teach both strength and respect. These steel claws are battleworn and slightly dulled, but still sturdy enough for combat.

items.brokenseal.name=claw sigil

items.brokenseal.cursed_armor=The claw won't apply to cursed armor.

items.brokenseal.affix=You affix the claw to your armor!

items.brokenseal.desc=A wooden claw, affixed to armor as a symbol of valor.\n\nMade by his own hand after completing his rite of passage, the claw helps the Va Shir persevere. While wearing the claw sigil the Chieftain will slowly generate shielding on top of his health based on the quality of his armor.\n\nThe claw can be _affixed to armor,_ and moved between armors. It can carry a single upgrade with it.