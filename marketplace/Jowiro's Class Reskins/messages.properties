items.weapon.melee.quarterstaff.ability_desc=The Monk can assume a _defensive stance_ with a quarterstaff. This stance triples his evasion for 5 turns and takes no time to activate, but costs 2 charges.

items.weapon.melee.quarterstaff.desc=A staff of hardwood, its ends are shod with iron.

