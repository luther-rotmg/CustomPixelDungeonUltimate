items.waterskin.name=Desert Eagle
items.waterskin.ac_drink=You...eat the bullets...why...?
items.waterskin.collected=Why are there so many bullets on the ground? You pick them up, I guess...
items.waterskin.full=Your gun is full!
items.waterskin.empty=Your gun is empty!
items.waterskin.desc=An expertly crafted chunk of metal designed to kill, yet you painstakingly keep eating the ammo. Stop it!
items.waterskin.desc_water=Congratulations! You're the proud owner of a brand new Desert Eagle! Have fun gunning down any monsters in your path!
items.waterskin.desc_heal=The gun is currently being used to store very poisonous bullets. Please. Don't keep eating them. I just...I can't...
items.waterskin.desc_full=The gun is radiating energy now? Why? How? Did it just...speak? What's an ankh?

items.dewdrop.name=bullet
items.dewdrop.heal=+%dHP
items.dewdrop.shield=+%dSHLD
items.dewdrop.both=+%1$dHP, +%2$dSHLD
items.dewdrop.already_full=Stop eating bullets! You're full, stop trying to eat more!
items.dewdrop.desc=A small chunk of metal and gunpowder.\n\nI don't know what's up with this dungeon, but there are bullets everywhere...and you just...keep eating them...

items.ankh.name=ankh
items.ankh.ac_bless=SHOOT IT
items.ankh.bless=You...you shot it? You just...emptied your magazine...and now its glowing? This...this is too much...
items.ankh.desc=It's some sort of golden symbol...and it's...magnetizing to your gun? How...why do I even bother...?
items.ankh.desc_blessed=You shot it and it started glowing. Just about fits in with all the other crazy stuff down here. At least you didn't eat the bullets that time.

